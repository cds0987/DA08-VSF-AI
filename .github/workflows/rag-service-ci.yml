name: rag-service-ci

on:
  push:
    paths:
      - ".github/workflows/rag-service-ci.yml"
      - "src/rag-service/**"
  pull_request:
    paths:
      - ".github/workflows/rag-service-ci.yml"
      - "src/rag-service/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/rag-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: src/rag-service/requirements.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt
      - name: Run rag-service tests
        env:
          APP_ENV: development
          AI_PROVIDER: offline
        run: pytest tests -q

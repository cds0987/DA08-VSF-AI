name: rag-worker + mcp-service search semantic

on:
  push:
    branches:
      - nguyendev
    paths:
      - ".github/workflows/rag-service-ci.yml"
      - "src/rag-worker/**"
      - "src/mcp-service/**"

jobs:
  # Guard lớp A: chặn lệch vectorstore contract giữa rag-worker (producer) và
  # mcp-service (consumer) NGAY ở PR, không cần hạ tầng. Lệch -> fail build.
  # Xem docs/search-split-vectorstore-contract.md §7.2.
  contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      # mcp-service nest config tool-local (embedder dưới `rag_search`) nên loader
      # rag-worker không đọc được config mcp. Parity tính bất đối xứng: script PHÍA
      # mcp-service dùng loader của mỗi service cho phía của nó. Cần cả 2 bộ deps.
      - name: Install dependencies (rag-worker + mcp-service)
        run: |
          python -m pip install --upgrade pip
          pip install -r src/rag-worker/requirements.txt
          pip install -r src/mcp-service/requirements.txt
      - name: Check vectorstore contract parity (mcp-service consumer vs rag-worker producer)
        run: python src/mcp-service/scripts/check_vectorstore_contract.py

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/rag-worker
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: src/rag-worker/requirements.txt
      - name: Install dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements.txt

      # --- Hạ tầng THẬT bằng docker (giống production) -------------------------
      # NATS JetStream cần arg `-js` (service container không override command được) -> docker run.
      # MinIO = S3 object storage; Qdrant = vector DB host riêng. Cả ba cùng docker engine của runner.
      - name: Start NATS (JetStream)
        run: docker run -d --name nats -p 4222:4222 nats:2.10 -js

      - name: Start MinIO (S3)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data

      - name: Start Qdrant (vector DB)
        run: docker run -d --name qdrant -p 6333:6333 qdrant/qdrant

      - name: Wait for infra (NATS 4222 / MinIO 9000 / Qdrant 6333)
        run: |
          ready() { (echo > /dev/tcp/127.0.0.1/$1) 2>/dev/null; }
          for port in 4222 9000 6333; do
            ok=""
            for i in $(seq 1 60); do
              if ready "$port"; then echo "port $port up"; ok=1; break; fi
              sleep 1
            done
            if [ -z "$ok" ]; then
              echo "infra port $port did not become ready" >&2
              docker ps -a
              docker logs nats || true; docker logs minio || true; docker logs qdrant || true
              exit 1
            fi
          done

      # Suite chính chạy NATS OFF (các test dựng app không cần broker; set NATS_URL
      # toàn cục sẽ làm mọi TestClient mở subscription -> trùng durable). E2e tách riêng.
      - name: Run rag-worker tests (infra off)
        env:
          APP_ENV: development
          AI_PROVIDER: offline
        run: pytest tests -q -ra --ignore=tests/e2e

      # E2e THẬT: rag-worker chạy trên NATS + MinIO + Qdrant thật; chỉ message
      # document-service được giả lập (upload MinIO + publish doc.ingest/doc.access).
      - name: Run e2e protocol tests (real infra on)
        env:
          APP_ENV: development
          AI_PROVIDER: offline
          NATS_URL: nats://127.0.0.1:4222
          # S3 / MinIO (rag-worker s3_parser + test upload đều đọc các biến S3_*)
          PARSER_IMPL: s3
          S3_ENDPOINT_URL: http://127.0.0.1:9000
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
          S3_REGION: us-east-1
          E2E_S3_BUCKET: rag-e2e
          # Qdrant (vector DB host riêng)
          VECTOR_DB_URL: http://127.0.0.1:6333
        run: pytest tests/e2e -q -ra

      - name: Infra logs on failure
        if: failure()
        run: |
          docker logs nats || true
          docker logs minio || true
          docker logs qdrant || true

  # LUỒNG THẬT 2 service: rag-worker (producer) ingest TOÀN BỘ validation corpus qua
  # message thật (NATS) + object storage thật (MinIO) vào Qdrant; mcp-service (consumer)
  # semantic search lại trên CÙNG Qdrant. Service ở giữa (document-service / query-service)
  # được GIẢ LẬP bằng message + script. Ranh giới duy nhất giữa 2 service là Qdrant.
  search-semantic:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # --- Hạ tầng THẬT bằng docker (giống production) -------------------------
      - name: Start NATS (JetStream)
        run: docker run -d --name nats -p 4222:4222 nats:2.10 -js

      - name: Start MinIO (S3 object storage)
        run: |
          docker run -d --name minio -p 9000:9000 \
            -e MINIO_ROOT_USER=minioadmin \
            -e MINIO_ROOT_PASSWORD=minioadmin \
            minio/minio server /data

      - name: Start Qdrant (vector DB)
        run: docker run -d --name qdrant -p 6333:6333 qdrant/qdrant

      - name: Wait for infra (NATS 4222 / MinIO 9000 / Qdrant 6333)
        run: |
          ready() { (echo > /dev/tcp/127.0.0.1/$1) 2>/dev/null; }
          for port in 4222 9000 6333; do
            ok=""
            for i in $(seq 1 60); do
              if ready "$port"; then echo "port $port up"; ok=1; break; fi
              sleep 1
            done
            if [ -z "$ok" ]; then
              echo "infra port $port did not become ready" >&2
              docker ps -a
              docker logs nats || true; docker logs minio || true; docker logs qdrant || true
              exit 1
            fi
          done

      - name: Install deps (rag-worker producer + mcp-service consumer)
        run: |
          python -m pip install --upgrade pip
          pip install -r src/rag-worker/requirements.txt
          pip install -r src/mcp-service/requirements.txt

      # PRODUCER: rag-worker ingest CẢ corpus qua NATS+MinIO + ghi dấu niêm vào Qdrant.
      # KHÔNG override VECTOR_COLLECTION -> collection mặc định khớp index_id mcp đọc.
      - name: Seed Qdrant via rag-worker (full corpus, NATS + MinIO)
        working-directory: src/rag-worker
        env:
          APP_ENV: development
          AI_PROVIDER: offline
          PARSER_IMPL: s3
          NATS_URL: nats://127.0.0.1:4222
          S3_ENDPOINT_URL: http://127.0.0.1:9000
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
          S3_REGION: us-east-1
          E2E_S3_BUCKET: rag-e2e
          VECTOR_DB_URL: http://127.0.0.1:6333
        run: python scripts/seed_validation_corpus_e2e.py

      # CONSUMER happy path: mcp verify dấu niêm + semantic search cả corpus.
      # offline embed không ngữ nghĩa -> lexical rerank + threshold 0 lái đúng doc.
      - name: mcp-service verify + search full corpus (expect success)
        working-directory: src/mcp-service
        env:
          AI_PROVIDER: offline
          RERANK_PROVIDER: lexical
          RERANK_THRESHOLD: "0"
          SEARCH_TOP_K: "50"
          VECTOR_DB_URL: http://127.0.0.1:6333
        run: python scripts/e2e_search_validation.py

      # CONSUMER drift: mcp dùng model khác (bge-m3) -> collection/stamp không khớp
      # -> verify FAIL-CLOSED. CI phải thấy non-zero; nếu exit 0 là guard thủng.
      - name: mcp-service drift must fail-closed (expect non-zero)
        working-directory: src/mcp-service
        env:
          AI_PROVIDER: openai
          EMBED_MODEL: bge-m3
          RERANK_PROVIDER: none
          VECTOR_DB_URL: http://127.0.0.1:6333
        run: |
          if python scripts/e2e_search_validation.py; then
            echo "DRIFT NOT CAUGHT: mcp phục vụ search dù lệch contract" >&2
            exit 1
          fi
          echo "OK: mcp fail-closed khi lệch contract"

      - name: Infra logs on failure
        if: failure()
        run: |
          docker logs nats || true
          docker logs minio || true
          docker logs qdrant || true

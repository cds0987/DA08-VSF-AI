name: ai-router (test + build + push)

# CI ĐỘC LẬP cho ai-router — KHÔNG dính e2e gate của deploy-develop.yml (đang đỏ kinh niên
# do hr-service/migration). Chỉ chạy khi src/ai-router/** đổi. Test -> build -> push image.
on:
  push:
    branches: [develop]
    paths:
      - "src/ai-router/**"
      - ".github/workflows/ai-router.yml"
  workflow_dispatch:

concurrency:
  group: ai-router-build
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: src/ai-router
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: src/ai-router/requirements.txt
      - name: Install deps
        run: python -m pip install --upgrade pip && pip install -r requirements.txt pytest
      - name: Unit tests (offline, MemoryCounters)
        run: python -m pytest tests -q -ra

  build-push:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build & push ai-router
        uses: docker/build-push-action@v6
        with:
          context: ./src/ai-router
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-router:develop
            ${{ secrets.DOCKERHUB_USERNAME }}/ai-router:${{ github.sha }}
          cache-from: type=gha,scope=ai-router
          cache-to: type=gha,scope=ai-router,mode=max

version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: rag_chatbot
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  qdrant:
    image: qdrant/qdrant:v1.9.2
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  user-service:
    build: ./src/user-service
    ports:
      - "8000:8000"
    env_file: ./src/user-service/.env
    depends_on:
      - postgres
      - redis

  chat-service:
    build: ./src/chat-service
    ports:
      - "8001:8001"
    env_file: ./src/chat-service/.env
    depends_on:
      - postgres
      - redis
      - rag-service

  rag-service:
    build: ./src/rag-service
    ports:
      - "8002:8002"
    env_file: ./src/rag-service/.env
    depends_on:
      - postgres
      - qdrant

  frontend:
    build: ./src/frontend
    ports:
      - "3000:3000"
    env_file: ./src/frontend/.env.local
    depends_on:
      - user-service
      - chat-service

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./src/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - user-service
      - chat-service
      - frontend

volumes:
  postgres_data:
  qdrant_data:

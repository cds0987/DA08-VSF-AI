version: "3.9"

services:
  nats:
    image: nats:2.10
    command: ["-js", "-c", "/etc/nats/jetstream.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./infra/nats/jetstream.conf:/etc/nats/jetstream.conf:ro
      - nats_data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  user-service:
    build:
      context: ./src/user-service
    ports:
      - "8000:8000"
    env_file:
      - ./deploy/env/user-service.env
    restart: unless-stopped

  document-service:
    build:
      context: ./src/document-service
    ports:
      - "8002:8002"
    env_file:
      - ./deploy/env/document-service.env
    depends_on:
      - nats
    restart: unless-stopped
    volumes:
        - /home/tranhuugiahuynb/secrets/gcp-sa.json:/secrets/gcp-sa.json:ro

  query-service:
    build:
      context: ./src/query-service
    ports:
      - "8001:8001"
    env_file:
      - ./deploy/env/query-service.env
    depends_on:
      - nats
      - redis
    restart: unless-stopped

  # Migration one-shot: alembic upgrade head lên Cloud SQL TRƯỚC khi rag-worker chạy.
  # Tách riêng (không nhét vào rag-worker startup) để khi scale nhiều worker không
  # chạy đua DDL trên cùng DB, và migration lỗi -> fail-fast thay vì crash-loop.
  # DB là Cloud SQL (external, luôn sẵn) nên không depends_on service nào; DevOps
  # phải CREATE DATABASE rag_db sẵn + mở mạng VM -> Cloud SQL trước khi deploy.
  # Build image ở đây (rag-worker:local); rag-worker tái dùng image, không build lại.
  rag-migrate:
    build:
      context: ./src/rag-worker
    image: rag-worker:local
    command: ["alembic", "upgrade", "head"]
    working_dir: /app
    env_file:
      - ./deploy/env/rag-worker.env
    # 1 biến Cloud SQL URL duy nhất cho cả deploy + dev/test (RAG_DATABASE_URL):
    # default = Cloud SQL (deploy chạy ngay); DevOps/dev đặt RAG_DATABASE_URL trong
    # .env để rag-worker + DevOps phát triển song song trên CÙNG 1 Cloud SQL.
    environment:
      DATABASE_URL: ${RAG_DATABASE_URL:-postgresql+psycopg://postgres:***REDACTED-DB-PW***@34.87.63.152:5432/rag_db}
    restart: "no"

  rag-worker:
    image: rag-worker:local
    env_file:
      - ./deploy/env/rag-worker.env
    environment:
      DATABASE_URL: ${RAG_DATABASE_URL:-postgresql+psycopg://postgres:***REDACTED-DB-PW***@34.87.63.152:5432/rag_db}
    depends_on:
      nats:
        condition: service_started
      rag-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
        - /home/tranhuugiahuynb/secrets/gcp-sa.json:/secrets/gcp-sa.json:ro

  mcp-service:
    build:
      context: ./src/mcp-service
    ports:
      - "8003:8003"
    env_file:
      - ./deploy/env/mcp-service.env
    depends_on:
      - nats
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - user-service
      - document-service
      - query-service
      - mcp-service
      - rag-worker
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  nats_data:
  redis_data:

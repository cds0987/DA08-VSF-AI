# New Relic APM dùng chung cho mọi service. License key là region EU (prefix eu01) ->
# agent tự detect collector EU, không cần set NEW_RELIC_HOST. Mỗi service tự đặt
# NEW_RELIC_APP_NAME riêng (merge anchor này + override app name).
x-newrelic: &newrelic
  NEW_RELIC_LICENSE_KEY: "${NEW_RELIC_LICENSE_KEY}"
  NEW_RELIC_DISTRIBUTED_TRACING_ENABLED: "true"
  NEW_RELIC_APPLICATION_LOGGING_ENABLED: "true"
  NEW_RELIC_LOG: stderr

services:
  nats:
    image: nats:2.10
    command: ["-js", "-c", "/etc/nats/jetstream.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./infra/nats/jetstream.conf:/etc/nats/jetstream.conf:ro
      - nats_data:/data
    restart: unless-stopped

  # NGUỒN DUY NHẤT provision JetStream stream (DOC_EVENTS/NOTIFY_EVENTS/HR_EVENTS)
  # theo infra/nats/subjects.md + migrate xóa stream legacy DOCS. One-shot chạy
  # TRƯỚC service -> mọi service verify-only, hết cảnh đua add_stream gây overlap.
  # Dùng image rag-worker (đã có nats-py) + script Python -> không phụ thuộc cú
  # pháp nats CLI theo version. Override CMD (image rag-worker chỉ có CMD, không ENTRYPOINT).
  nats-bootstrap:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/rag-worker:${IMAGE_TAG:-develop}
    depends_on:
      nats:
        condition: service_started
    command: ["python", "/etc/nats/bootstrap_streams.py"]
    environment:
      NATS_URL: nats://nats:4222
    volumes:
      - ./infra/nats/bootstrap_streams.py:/etc/nats/bootstrap_streams.py:ro
    restart: "no"

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Postgres APP in-compose (thay Cloud SQL — nguyên tắc 1-VM: không host DB ngoài VM).
  # Tạo 5 DB (user/doc/query/rag/hr) qua init-db.sql lần đầu. Data bền qua volume
  # app_pg_data. Password = ${POSTGRES_PASSWORD} (root .env, sinh từ GitHub Secrets lúc deploy);
  # CÙNG biến dùng để build DATABASE_URL ở mỗi service -> không lệch.
  # ⚠ Mất VM = mất DB -> nên cron pg_dump đẩy GCS để backup.
  app-postgres:
    image: postgres:16-alpine
    # MỞ RỘNG CORE (e2-custom-16): max_connections 200->300 cho 6 replica × 4 repo × 8 = 192 + service
    # khác (~30) < 300. shared_buffers 512MB->1GB (VM 32GB RAM dư thoải mái cho nhiều connection).
    command: ["postgres", "-c", "max_connections=300", "-c", "shared_buffers=1GB"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
    volumes:
      - app_pg_data:/var/lib/postgresql/data
      - ./infra/postgres/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  # Qdrant CÙNG VM với rag-worker + mcp-service: chạy trong compose network, KHÔNG
  # expose host port -> không truy cập được từ ngoài. Producer (rag-worker) + consumer
  # (mcp-service) nói chuyện qua http://qdrant:6333 nội bộ. Bỏ phụ thuộc Qdrant Cloud /
  # qdrant-base external + nginx basic-auth. Data bền qua volume qdrant_data.
  qdrant:
    image: qdrant/qdrant:v1.18.0
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # ───────────── Langfuse (LLM observability — self-host "Cloud thu nhỏ" trong VM) ─────────────
  # Pattern GIỐNG qdrant: chạy nội bộ compose, data bền qua volume. KHÁC qdrant ở chỗ
  # CÓ mở host port 3100 -> chỉ để xem dashboard qua SSH tunnel (firewall VM chỉ 80/443/22
  # nên cổng này KHÔNG ra Internet). Service nội bộ gọi nhau qua http://langfuse:3000.
  #
  # ⚠ AN TOÀN PROD: KHÔNG service app nào depends_on langfuse; langfuse KHÔNG nằm trong
  #   health-gate/rollback của CI -> langfuse chết cũng KHÔNG kéo sập / rollback app.
  #   Các service chỉ TÙY CHỌN gửi trace (OBSERVABILITY_MODE=langfuse). Mặc định off.
  #
  # Langfuse v2 (gọn, hợp VM 8GB). Lên v3 = migration 1 chiều sang ClickHouse -> nên
  # dựng VM riêng khi scale, rồi chỉ đổi LANGFUSE_HOST. Pin minor thật ở prod (vd :2.95.x).
  langfuse-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD}
      POSTGRES_DB: langfuse
    volumes:
      - langfuse_pg_data:/var/lib/postgresql/data
    restart: unless-stopped

  langfuse:
    image: langfuse/langfuse:2
    depends_on:
      - langfuse-db
    ports:
      - "127.0.0.1:3100:3000"   # CHỈ loopback VM -> không lộ Internet; xem dashboard qua SSH tunnel.
                                 # Service nội bộ compose dùng http://langfuse:3000 (không qua cổng này).
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: "${NEXTAUTH_SECRET}"
      SALT: "${LANGFUSE_SALT}"
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      # Team truy cập dashboard qua subdomain Cloudflare: https://langfuse.vsfchat.cloud
      # (Cloudflare TLS -> origin nginx :80 -> langfuse:3000, gác Basic Auth). NEXTAUTH_URL
      # PHẢI = URL công khai này để login redirect/callback đúng. Cổng loopback 3100 GIỮ LẠI
      # cho deploy.sh readiness check (http://localhost:3100/api/public/*), KHÔNG dùng để vào UI.
      NEXTAUTH_URL: https://langfuse.vsfchat.cloud
      TELEMETRY_ENABLED: "true"
      # Bootstrap headless: boot lần đầu tự tạo org + project + ĐÓNG ĐINH cặp key (= common.env).
      # ⚠ LANGFUSE_INIT_ORG_ID là CỜ KÍCH HOẠT — thiếu nó thì init KHÔNG chạy (key không tạo -> 401).
      # Dev khác KHÔNG cần vào UI tạo key — dùng thẳng cặp key dưới đây ở service của mình.
      LANGFUSE_INIT_ORG_ID: vsf
      LANGFUSE_INIT_ORG_NAME: VSF
      LANGFUSE_INIT_PROJECT_ID: rag-chatbot
      LANGFUSE_INIT_PROJECT_NAME: VSF RAG Chatbot
      LANGFUSE_INIT_PROJECT_PUBLIC_KEY: ${LANGFUSE_PUBLIC_KEY}
      LANGFUSE_INIT_PROJECT_SECRET_KEY: ${LANGFUSE_SECRET_KEY}
      LANGFUSE_INIT_USER_EMAIL: admin@company.com
      LANGFUSE_INIT_USER_NAME: VSF Admin
      LANGFUSE_INIT_USER_PASSWORD: ${LANGFUSE_INIT_USER_PASSWORD}
    restart: unless-stopped

  # Image kéo từ Docker Hub (KHÔNG build trên VM). CI build+push ở Phase 2; VM chỉ pull.
  # DOCKERHUB_USERNAME + IMAGE_TAG do deploy workflow truyền qua SSH env (mặc định: develop).
  # Migration one-shot user_db (alembic upgrade head). Cùng pattern hr-migrate: dùng CHUNG
  # image user-service; env.py đọc USER_SERVICE_DATABASE_URL (fallback DATABASE_URL) — CÙNG
  # biến runtime. Thay cho runner tự chế scripts/migrate.py (đã bỏ). DevOps phải CREATE
  # DATABASE user_db trên Cloud SQL trước. LƯU Ý chuyển DB cũ đang có data: chạy
  # `alembic stamp 0001_baseline` MỘT LẦN trên VM trước khi bật service này (xem
  # docs/nguyenworking/05-db-migration-va-dong-bo.md §1.4).
  user-migrate:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/user-service:${IMAGE_TAG:-develop}
    command: ["alembic", "upgrade", "head"]
    working_dir: /app
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/user-service.env
      - ./deploy/env/secret.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/user_db
    depends_on:
      app-postgres:
        condition: service_healthy
    restart: "no"

  user-backfill:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/user-service:${IMAGE_TAG:-develop}
    command: ["python", "scripts/backfill_user_events.py"]
    working_dir: /app
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/user-service.env
      - ./deploy/env/secret.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/user_db
    depends_on:
      user-migrate:
        condition: service_completed_successfully
      nats-bootstrap:
        condition: service_completed_successfully
    restart: "no"

  user-service:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/user-service:${IMAGE_TAG:-develop}
    ports:
      - "8000:8000"
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/user-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-user-service
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/user_db
    depends_on:
      user-migrate:
        condition: service_completed_successfully
      seed-user:
        condition: service_completed_successfully
    restart: unless-stopped

  # Seed admin one-shot (thay "seed Cloud SQL tay 1 lần" cũ). app-postgres mới tinh +
  # alembic chỉ ALTER -> KHÔNG có bảng base user_svc.users + KHÔNG có admin. seed_user.py
  # tạo schema + bảng (create_all) + seed admin@company.com (idempotent). KHÔNG seed thì
  # login + smoke deploy fail. Dùng CHUNG image user-service; mount script từ infra/e2e.
  seed-user:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/user-service:${IMAGE_TAG:-develop}
    command: ["python", "/seed/seed_user.py"]
    working_dir: /app
    environment:
      PYTHONPATH: /app
      USER_SERVICE_DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/user_db
      SEED_ADMIN_EMAIL: admin@company.com
      SEED_ADMIN_PASSWORD: "${SEED_ADMIN_PASSWORD}"
    volumes:
      - ./infra/e2e/seed_user.py:/seed/seed_user.py:ro
    depends_on:
      app-postgres:
        condition: service_healthy
      user-migrate:
        condition: service_completed_successfully
    restart: "no"

  # Migration one-shot doc_db (alembic upgrade head). Cùng pattern hr-migrate/rag-migrate:
  # dùng CHUNG image document-service; env.py đọc DOCUMENT_SERVICE_DATABASE_URL (fallback
  # DATABASE_URL) — CÙNG biến runtime -> migrate + runtime cùng 1 DB. DevOps phải CREATE
  # DATABASE doc_db trên Cloud SQL trước. LƯU Ý chuyển DB cũ đang có data: chạy
  # `alembic stamp 0001_baseline` MỘT LẦN trên VM trước khi bật service này (xem
  # docs/nguyenworking/05-db-migration-va-dong-bo.md §1.4).
  doc-migrate:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/document-service:${IMAGE_TAG:-develop}
    command: ["alembic", "upgrade", "head"]
    working_dir: /app
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/document-service.env
      - ./deploy/env/secret.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/doc_db
    depends_on:
      app-postgres:
        condition: service_healthy
    restart: "no"

  document-service:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/document-service:${IMAGE_TAG:-develop}
    ports:
      - "8002:8002"
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/document-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-document-service
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/doc_db
    depends_on:
      nats:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      doc-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # Convert office (doc/docx/xls/xlsx/ppt/pptx) -> PDF cho viewer inline. CHỈ trong compose
  # network (KHÔNG expose host port -> tài liệu mật không ra Internet). document-service
  # POST bytes -> nhận PDF. KHÔNG service nào depends_on cứng -> gotenberg chết chỉ làm
  # preview office lỗi 503, app KHÔNG sập (FE hiện error card: Thử lại + Tải bản gốc).
  gotenberg:
    image: gotenberg/gotenberg:8
    restart: unless-stopped

  query-migrate:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/query-service:${IMAGE_TAG:-develop}
    command: ["python", "-m", "app.infrastructure.db.migrate"]
    working_dir: /app
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/query-service.env
      - ./deploy/env/secret.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/query_db
    depends_on:
      app-postgres:
        condition: service_healthy
    restart: "no"

  query-service:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/query-service:${IMAGE_TAG:-develop}
    # SCALE NGANG bằng REPLICA (query-service + query-service-2): mỗi container 1 uvicorn process
    # = SSE AN TOÀN (KHÁC --workers đa-process gây "peer closed" cắt SSE). nginx `upstream query_pool`
    # round-robin qua 2 replica -> chia tải event-loop+DB ở 150. ports chỉ ở replica-1 (debug).
    ports:
      - "8001:8001"
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/query-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-query-service
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/query_db
      # 2 replica × 4 repo × 8 = 64 < PG max_connections=100 (dư cho service khác ~23).
      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "8"
    depends_on:
      app-postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      query-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 8s          # nới 5->8s: đỡ "unhealthy" giả khi /health chậm dưới burst 150
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # Replica-2: clone query-service, KHÔNG bind host port -> nginx tới qua tên service (upstream).
  query-service-2:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/query-service:${IMAGE_TAG:-develop}
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/query-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-query-service
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/query_db
      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "8"
    depends_on:
      app-postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      query-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # Replica 3-6: clone (e2-custom-16 -> 6 replica query-service tổng, mỗi container 1 uvicorn = SSE an
  # toàn). nginx `upstream query_pool` round-robin cả 6 -> chia tải event-loop+DB ở 150-burst heavy.
  query-service-3:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/query-service:${IMAGE_TAG:-develop}
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/query-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-query-service
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/query_db
      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "8"
    depends_on:
      app-postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      query-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  query-service-4:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/query-service:${IMAGE_TAG:-develop}
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/query-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-query-service
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/query_db
      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "8"
    depends_on:
      app-postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      query-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  query-service-5:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/query-service:${IMAGE_TAG:-develop}
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/query-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-query-service
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/query_db
      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "8"
    depends_on:
      app-postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      query-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  query-service-6:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/query-service:${IMAGE_TAG:-develop}
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/query-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-query-service
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/query_db
      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "8"
    depends_on:
      app-postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      query-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # Replica 7-8: TRACE 150-burst 2026-06-25 -> 5-6 replica VẪN pegged 100% CPU (mcp/qdrant RỖNG)
  # -> plan-stream bị cắt (fallback 51) + rag timeout (breaker 65). 8 replica: 150/8≈19/loop < ngưỡng
  # peg (~25-30) -> stream plan KHÔNG cắt + rag service kịp. 8×4×8=256 < PG max_connections=300.
  query-service-7:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/query-service:${IMAGE_TAG:-develop}
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/query-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-query-service
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/query_db
      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "8"
    depends_on:
      app-postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      query-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  query-service-8:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/query-service:${IMAGE_TAG:-develop}
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/query-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-query-service
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/query_db
      DB_POOL_MIN_SIZE: "2"
      DB_POOL_MAX_SIZE: "8"
    depends_on:
      app-postgres:
        condition: service_healthy
      nats:
        condition: service_started
      redis:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      query-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8001/health"]
      interval: 10s
      timeout: 8s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ───────────── AI Router (gateway OpenAI-compatible, stateless) ─────────────
  # Đứng GIỮA AI-logic service và provider (OpenAI/OpenRouter). Service trỏ base_url
  # http://ai-router:8010/v1 + dùng OpenAI SDK như cũ (MOSA, zero dependency).
  # ACTIVE 2026-06-17: query-service route LLM chính qua đây (LLM_MODEL_ADAPTER=chat +
  # OPENAI_BASE_URL). Rollback tức thì: query-service.env -> LLM_MODEL_ADAPTER=responses.
  # ⚠ AN TOÀN: KHÔNG service nào depends_on ai-router -> ai-router chết KHÔNG kéo sập app.
  # Key auto-discover từ secret.env (OPENAI_API_KEY_{n} / OPENROUTER_API_KEY_{n}); state ở redis.
  ai-router:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/ai-router:${IMAGE_TAG:-develop}
    ports:
      - "127.0.0.1:8010:8010"   # /admin/quota qua SSH tunnel; KHÔNG ra Internet
    env_file:
      - ./deploy/env/secret.env
    environment:
      AIROUTER_REDIS_URL: redis://redis:6379/1
      # BỎ internal token: ai-router chỉ ROUTE AI nội bộ (bind 127.0.0.1 + compose network, KHÔNG
      # ra Internet) -> auth không cần. Rỗng -> _auth() return sớm (bỏ qua). Dứt điểm 401 "invalid
      # internal token" (worker cache client key stale / lệch token lúc deploy). Override env_file.
      AIROUTER_INTERNAL_TOKEN: ""
      # 2026-06-27: BỎ HẲN OTel (trace) -> uvicorn MULTI-WORKER (thoát GIL 1-core, dùng nhiều core).
      # Trước đây OTel auto-instrument ép workers=1 (không tương thích fork) + team thử multi-worker
      # thấy không giảm TTFT (vì TTFT do provider+pipeline, KHÔNG phải ai-router CPU) -> giữ OTel.
      # NAY: metrics dashboard ĐÃ chuyển Redis-shared (observability.RedisMetricsSink) -> /metrics ĐÚNG
      # dù N worker -> Grafana không vỡ. Multi-worker để tăng THROUGHPUT dưới tải đồng thời (đo lại).
      VSF_OTEL_ENABLED: "0"
      UVICORN_WORKERS: "8"          # 6->8: push throughput tối đa (company scale). ingest-6 đo ai-router
                                    # 70% + embed 0-shrink (còn headroom) -> đẩy ai-router+ingest tới trần
                                    # VM. Đo doc/min max + nơi ceiling (embed-429 / ai-router-max / VM-core).
      AIROUTER_AIMD_INIT: "32"      # nâng trần deepseek ~150 user: 5 OR key×32=160 slot cold-burst.
                                    # ⚠ chỉ tháo cap CỦA TA; nếu provider 429 hàng loạt -> trần thật
                                    # là OpenRouter, phải THÊM KEY. AIMD vẫn tự co ×0.5 khi gặp 429.
    depends_on:
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8010/health')"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 15s
    restart: unless-stopped

  # ───────────── Monitoring stack ĐÃ TÁCH RA FILE RIÊNG ─────────────
  # Prometheus/Grafana/Alertmanager/node-exporter/cAdvisor (+ tương lai Tempo/Loki/OTel
  # Collector) nằm ở docker-compose.observability.yml — devops sở hữu, lifecycle độc lập.
  # Chạy overlay CÙNG project để DÙNG CHUNG network (Prometheus scrape ai-router:8010):
  #   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d <svc>
  # (deploy.sh đã wire sẵn). App KHÔNG phụ thuộc — observability mất chỉ mất biểu đồ.

  # Migration one-shot: alembic upgrade head lên app-postgres TRƯỚC khi rag-worker chạy.
  # Tách riêng (không nhét vào rag-worker startup) để khi scale nhiều worker không
  # chạy đua DDL trên cùng DB, và migration lỗi -> fail-fast thay vì crash-loop.
  # DB là Cloud SQL (external, luôn sẵn) nên không depends_on service nào; DevOps
  # phải CREATE DATABASE rag_db sẵn + mở mạng VM -> Cloud SQL trước khi deploy.
  # Dùng CHUNG image rag-worker (đã pull từ Docker Hub); chỉ override command = alembic.
  rag-migrate:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/rag-worker:${IMAGE_TAG:-develop}
    command: ["alembic", "upgrade", "head"]
    working_dir: /app
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/rag-worker.env
      - ./deploy/env/secret.env
    # DATABASE_URL = nguồn DUY NHẤT ở đây (password từ ${POSTGRES_PASSWORD} root .env;
    # db-name literal = config trong git). KHÔNG còn trong env_file -> không split-brain.
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/rag_db
    depends_on:
      app-postgres:
        condition: service_healthy
    restart: "no"

  # Multi-collection embed one-shot: đọc embeddings.yaml -> TẠO collection THIẾU trong Qdrant
  # (model mới). CHỈ tạo collection (--yes, KHÔNG backfill) -> NHANH, blocking-được, idempotent.
  # APPEND-ONLY: KHÔNG xóa collection cũ. Deploy thường (config không đổi) -> mọi collection đã
  # sẵn -> NO-OP. Backfill corpus (chậm) do deploy.sh launch DETACHED (--backfill-new). Cùng image
  # rag-worker; pattern giống rag-migrate. depends_on rag-migrate (schema sẵn) + qdrant.
  rag-multi-embed-migrate:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/rag-worker:${IMAGE_TAG:-develop}
    command: ["python", "scripts/multi_embed_migrate.py", "--yes"]
    working_dir: /app
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/rag-worker.env
      - ./deploy/env/secret.env
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/rag_db
      # forward-write + migrate multi-collection chỉ chạy khi bật cờ này.
      MULTI_EMBED_ENABLED: "1"
      # MỌI AI (embed) qua ai-router: 1 token -> gateway (giống rag-worker/ingest).
      EMBED_API_KEY: ${AIROUTER_INTERNAL_TOKEN:-}
    depends_on:
      qdrant:
        condition: service_started
      rag-migrate:
        condition: service_completed_successfully
    restart: "no"

  rag-worker:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/rag-worker:${IMAGE_TAG:-develop}
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/rag-worker.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-rag-worker
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/rag_db
      # SEARCH-ONLY: KHÔNG spawn ingest-worker -> chat-search-latency KHÔNG bị ingest
      # bóp. Ingest do service rag-ingest-worker (INGEST_ENABLED=true) đảm nhận riêng.
      # mcp-service vẫn route /api/search vào ĐÂY (rag-worker:8000).
      INGEST_ENABLED: "false"
      # BẬT SHARD-READ: embeddings.yaml mode=shard -> doc chia 1/5 collection. Search PHẢI query
      # 5 collection + merge (nếu không doc shard ngoài-qwen KHÔNG tìm thấy). MULTI_EMBED_ENABLED=1
      # wire shard_read_targets (runtime.py:797). INGEST_ENABLED=false nên chỉ READ-merge, không ingest.
      MULTI_EMBED_ENABLED: "1"
      # MỌI AI qua ai-router: 1 TOKEN -> gateway (ai-router giữ 2 key thật OpenRouter+OpenAI, tự
      # route). caption/ocr kế thừa key này. ${} substitute từ deploy env; env_file không substitute.
      EMBED_API_KEY: ${AIROUTER_INTERNAL_TOKEN:-}
    depends_on:
      nats:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      rag-migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  # INGEST-ONLY worker (scale ngang dùng core rảnh, CÔ LẬP khỏi /api/search).
  # Cùng image rag-worker, KHÔNG host ports, KHÔNG nằm trong mcp depends_on /
  # search routing. claim-lease DB-safe (claim_next_pending + _maintain_claim_lease)
  # cho phép nhiều replica claim job an toàn không trùng.
  # SCALE: deploy.replicas KHÔNG được `docker compose up` tôn trọng nếu thiếu
  # --compatibility; deploy.sh dùng `--scale rag-ingest-worker=4` để lên đúng N.
  rag-ingest-worker:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/rag-worker:${IMAGE_TAG:-develop}
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/rag-worker.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-rag-ingest-worker
      DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/rag_db
      INGEST_ENABLED: "true"
      INGEST_WORKER_COUNT: "2"
      # forward-write multi-collection: ingest thật đồng thời ghi mọi collection active
      # (embeddings.yaml) ngoài primary qwen8b. Tắt -> chỉ ghi primary (multi-embed là augment).
      MULTI_EMBED_ENABLED: "1"
      # Part A đã đo: embed PROVIDER-throughput-bound (~18 chunk/s). Batch tuning vô ích.
      # Giữ batch default 100 + concurrency 16 (transient-safe).
      EMBED_BATCH_MAX_CONCURRENCY: "16"
      # chunk-180 TEST (Part A): embed −26% (20.6→15.2s) NHƯNG recall@1 tụt 0.944→0.873 (−7.5%)
      # -> TRƯỢT quality-gate -> REVERT về default 90/15. Chunk-size KHÔNG phải lever embed an toàn.
      EMBED_API_KEY: ${AIROUTER_INTERNAL_TOKEN:-}
    depends_on:
      nats:
        condition: service_started
      nats-bootstrap:
        condition: service_completed_successfully
      qdrant:
        condition: service_started
      rag-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    deploy:
      replicas: 8

  mcp-service:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/mcp-service:${IMAGE_TAG:-develop}
    ports:
      - "8003:8003"
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/mcp-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-mcp-service
    depends_on:
      nats:
        condition: service_started
      qdrant:
        condition: service_started
      rag-worker:
        condition: service_healthy
      hr-service:
        condition: service_healthy
    restart: unless-stopped

  # Migration one-shot hr_db (alembic upgrade head). Cùng pattern rag-migrate: build
  # dùng CHUNG image hr-service (pull từ Docker Hub). alembic env.py đọc HR_DATABASE_URL
  # (fallback DATABASE_URL) — CÙNG biến runtime hr-service đọc, KHÔNG override compose
  # nữa -> migrate + runtime luôn cùng 1 DB (hết split-brain). Biến đến từ hr-service.env.
  # DevOps phải CREATE DATABASE hr_db trên Cloud SQL trước (xem deploy-develop.yml notes).
  hr-migrate:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/hr-service:${IMAGE_TAG:-develop}
    command: ["alembic", "upgrade", "head"]
    working_dir: /app
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/hr-service.env
      - ./deploy/env/secret.env
    environment:
      HR_DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/hr_db
    depends_on:
      app-postgres:
        condition: service_healthy
    restart: "no"

  hr-service:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/hr-service:${IMAGE_TAG:-develop}
    ports:
      - "8004:8004"
    env_file:
      - ./deploy/env/common.env
      - ./deploy/env/hr-service.env
      - ./deploy/env/secret.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-hr-service
      HR_DATABASE_URL: postgresql+psycopg://postgres:${POSTGRES_PASSWORD}@app-postgres:5432/hr_db
    depends_on:
      nats:
        condition: service_started
      hr-migrate:
        condition: service_completed_successfully
    healthcheck:
      # hr image là python -> dùng urllib (không có curl). /health yêu cầu internal token.
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen(urllib.request.Request('http://localhost:8004/health', headers={'X-Internal-Token': os.environ.get('HR_INTERNAL_TOKEN','')}))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  # ───────────── Frontend (Nuxt 4 SSR Node) — image pull từ Docker Hub như backend ─────────────
  # KHÔNG expose host port: chỉ nginx (cùng compose network) proxy tới. Browser luôn đi
  # qua nginx :80 -> FE và /api/* CÙNG origin -> KHÔNG phát sinh CORS.
  # API_GATEWAY_URL để rỗng -> axios gọi path tương đối (/api/...) theo origin hiện tại.
  frontend-chat:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/frontend-chat:${IMAGE_TAG:-develop}
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-frontend-chat
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "3000"
      NUXT_PUBLIC_API_GATEWAY_URL: ""
      NUXT_PUBLIC_USER_SERVICE_PATH: /api/user
      NUXT_PUBLIC_DOCUMENT_SERVICE_PATH: /api/documents
      NUXT_PUBLIC_QUERY_SERVICE_PATH: /api/query
      NUXT_PUBLIC_HR_SERVICE_PATH: /api/hr
      NUXT_PUBLIC_MCP_SERVICE_PATH: /api/mcp
      NUXT_PUBLIC_CHAT_APP_URL: /
      NUXT_PUBLIC_ADMIN_APP_URL: /admin/
    restart: unless-stopped

  frontend-admin:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/frontend-admin:${IMAGE_TAG:-develop}
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-frontend-admin
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: "3001"
      # Nuxt phục vụ dưới sub-path /admin/ (override runtime, không cần build lại).
      NUXT_APP_BASE_URL: /admin/
      NUXT_PUBLIC_API_GATEWAY_URL: ""
      NUXT_PUBLIC_USER_SERVICE_PATH: /api/user
      NUXT_PUBLIC_DOCUMENT_SERVICE_PATH: /api/documents
      NUXT_PUBLIC_QUERY_SERVICE_PATH: /api/query
      NUXT_PUBLIC_HR_SERVICE_PATH: /api/hr
      NUXT_PUBLIC_MCP_SERVICE_PATH: /api/mcp
      NUXT_PUBLIC_CHAT_APP_URL: /
      NUXT_PUBLIC_ADMIN_APP_URL: /admin/
    restart: unless-stopped

  # Image tự build (config nướng sẵn) pull từ Docker Hub — KHÔNG bind-mount nginx.conf.
  # Sửa tay file trên VM vô tác dụng; muốn đổi config phải sửa nginx/nginx.conf -> CI -> pull.
  nginx:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/nginx:${IMAGE_TAG:-develop}
    depends_on:
      - user-service
      - document-service
      - query-service
      - query-service-2
      - query-service-3
      - query-service-4
      - query-service-5
      - query-service-6
      - query-service-7
      - query-service-8
      - mcp-service
      - hr-service
      - rag-worker
      - frontend-chat
      - frontend-admin
    ports:
      - "80:80"
    volumes:
      # .htpasswd cho Basic Auth subdomain langfuse — render từ GitHub Secret lúc deploy
      # (render-secrets.sh), gitignored, fail-closed nếu secret rỗng. CHỈ mount file secret
      # này; nginx.conf VẪN nướng trong image (không bind-mount config -> chống sửa tay VM).
      - ./deploy/nginx/.htpasswd:/etc/nginx/.htpasswd:ro
      # Basic Auth subdomain qdrant — file RIÊNG (Qdrant không có login, Basic Auth là lớp
      # bảo vệ duy nhất + chắn cả REST API). Cùng pattern: render từ secret, gitignored, fail-closed.
      - ./deploy/nginx/.htpasswd-qdrant:/etc/nginx/.htpasswd-qdrant:ro
    restart: unless-stopped

volumes:
  nats_data:
  redis_data:
  qdrant_data:
  langfuse_pg_data:
  app_pg_data:
  # prometheus_data / grafana_data / alertmanager_data -> docker-compose.observability.yml

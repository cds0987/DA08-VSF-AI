version: "3.9"

# New Relic APM dùng chung cho mọi service. License key là region EU (prefix eu01) ->
# agent tự detect collector EU, không cần set NEW_RELIC_HOST. Mỗi service tự đặt
# NEW_RELIC_APP_NAME riêng (merge anchor này + override app name).
x-newrelic: &newrelic
  NEW_RELIC_LICENSE_KEY: "***REDACTED-NEWRELIC-KEY***"
  NEW_RELIC_DISTRIBUTED_TRACING_ENABLED: "true"
  NEW_RELIC_APPLICATION_LOGGING_ENABLED: "true"
  NEW_RELIC_LOG: stderr

services:
  nats:
    image: nats:2.10
    command: ["-js", "-c", "/etc/nats/jetstream.conf"]
    ports:
      - "4222:4222"
      - "8222:8222"
    volumes:
      - ./infra/nats/jetstream.conf:/etc/nats/jetstream.conf:ro
      - nats_data:/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # Qdrant CÙNG VM với rag-worker + mcp-service: chạy trong compose network, KHÔNG
  # expose host port -> không truy cập được từ ngoài. Producer (rag-worker) + consumer
  # (mcp-service) nói chuyện qua http://qdrant:6333 nội bộ. Bỏ phụ thuộc Qdrant Cloud /
  # qdrant-base external + nginx basic-auth. Data bền qua volume qdrant_data.
  qdrant:
    image: qdrant/qdrant:v1.12.4
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  # Image kéo từ Docker Hub (KHÔNG build trên VM). CI build+push ở Phase 2; VM chỉ pull.
  # DOCKERHUB_USERNAME + IMAGE_TAG do deploy workflow truyền qua SSH env (mặc định: develop).
  user-service:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/user-service:${IMAGE_TAG:-develop}
    ports:
      - "8000:8000"
    env_file:
      - ./deploy/env/user-service.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-user-service
    restart: unless-stopped

  document-service:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/document-service:${IMAGE_TAG:-develop}
    ports:
      - "8002:8002"
    env_file:
      - ./deploy/env/document-service.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-document-service
    depends_on:
      - nats
    restart: unless-stopped
    volumes:
        - /home/tranhuugiahuynb/secrets/gcp-sa.json:/secrets/gcp-sa.json:ro

  query-service:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/query-service:${IMAGE_TAG:-develop}
    ports:
      - "8001:8001"
    env_file:
      - ./deploy/env/query-service.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-query-service
    depends_on:
      - nats
      - redis
    restart: unless-stopped

  # Migration one-shot: alembic upgrade head lên Cloud SQL TRƯỚC khi rag-worker chạy.
  # Tách riêng (không nhét vào rag-worker startup) để khi scale nhiều worker không
  # chạy đua DDL trên cùng DB, và migration lỗi -> fail-fast thay vì crash-loop.
  # DB là Cloud SQL (external, luôn sẵn) nên không depends_on service nào; DevOps
  # phải CREATE DATABASE rag_db sẵn + mở mạng VM -> Cloud SQL trước khi deploy.
  # Dùng CHUNG image rag-worker (đã pull từ Docker Hub); chỉ override command = alembic.
  rag-migrate:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/rag-worker:${IMAGE_TAG:-develop}
    command: ["alembic", "upgrade", "head"]
    working_dir: /app
    env_file:
      - ./deploy/env/rag-worker.env
    # 1 biến Cloud SQL URL duy nhất cho cả deploy + dev/test (RAG_DATABASE_URL):
    # default = Cloud SQL (deploy chạy ngay); DevOps/dev đặt RAG_DATABASE_URL trong
    # .env để rag-worker + DevOps phát triển song song trên CÙNG 1 Cloud SQL.
    environment:
      DATABASE_URL: ${RAG_DATABASE_URL:-postgresql+psycopg://postgres:***REDACTED-DB-PW***@34.87.63.152:5432/rag_db}
    restart: "no"

  rag-worker:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/rag-worker:${IMAGE_TAG:-develop}
    env_file:
      - ./deploy/env/rag-worker.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-rag-worker
      DATABASE_URL: ${RAG_DATABASE_URL:-postgresql+psycopg://postgres:***REDACTED-DB-PW***@34.87.63.152:5432/rag_db}
    depends_on:
      nats:
        condition: service_started
      qdrant:
        condition: service_started
      rag-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    volumes:
        - /home/tranhuugiahuynb/secrets/gcp-sa.json:/secrets/gcp-sa.json:ro

  mcp-service:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/mcp-service:${IMAGE_TAG:-develop}
    ports:
      - "8003:8003"
    env_file:
      - ./deploy/env/mcp-service.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-mcp-service
    depends_on:
      nats:
        condition: service_started
      qdrant:
        condition: service_started
      rag-worker:
        condition: service_healthy
      hr-service:
        condition: service_healthy
    restart: unless-stopped

  # Migration one-shot hr_db (alembic upgrade head). Cùng pattern rag-migrate: build
  # dùng CHUNG image hr-service (pull từ Docker Hub). alembic env.py đọc DATABASE_URL;
  # runtime hr-service đọc HR_DATABASE_URL -> map qua environment ở đây.
  # DevOps phải CREATE DATABASE hr_db trên Cloud SQL trước (xem deploy-develop.yml notes).
  hr-migrate:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/hr-service:${IMAGE_TAG:-develop}
    command: ["alembic", "upgrade", "head"]
    working_dir: /app
    env_file:
      - ./deploy/env/hr-service.env
    environment:
      DATABASE_URL: ${HR_DATABASE_URL:-postgresql+psycopg://postgres:***REDACTED-DB-PW***@34.87.63.152:5432/hr_db}
    restart: "no"

  hr-service:
    image: ${DOCKERHUB_USERNAME:-CHANGE_ME}/hr-service:${IMAGE_TAG:-develop}
    ports:
      - "8004:8004"
    env_file:
      - ./deploy/env/hr-service.env
    environment:
      <<: *newrelic
      NEW_RELIC_APP_NAME: vsf-hr-service
    depends_on:
      nats:
        condition: service_started
      hr-migrate:
        condition: service_completed_successfully
    healthcheck:
      # hr image là python -> dùng urllib (không có curl). /health yêu cầu internal token.
      test: ["CMD", "python", "-c", "import os,urllib.request; urllib.request.urlopen(urllib.request.Request('http://localhost:8004/health', headers={'X-Internal-Token': os.environ.get('HR_INTERNAL_TOKEN','')}))"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    depends_on:
      - user-service
      - document-service
      - query-service
      - mcp-service
      - hr-service
      - rag-worker
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  nats_data:
  redis_data:
  qdrant_data:

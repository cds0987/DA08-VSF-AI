# ⚠️ NGUỒN CHUẨN = file này trong git. KHÔNG sửa tay nginx.conf trên VM:
#    mỗi lần deploy chạy `git reset --hard` -> mọi sửa tay trên VM bị GHI ĐÈ.
#    Mọi thay đổi (gồm CORS) phải sửa ở đây -> commit -> để CI/CD deploy.
#
# CORS: FE (/, /admin/) và /api/* CÙNG đi qua nginx :80 -> same-origin -> trình duyệt
# KHÔNG kích hoạt CORS. Vì vậy KHÔNG thêm Access-Control-* ở đây (tránh trùng header
# với CORSMiddleware của backend + tránh phản chiếu $http_origin kèm credentials).

# WebSocket/SSE upgrade helper: Connection = "upgrade" khi có header Upgrade, "" nếu không.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location /api/user/ {
        proxy_pass http://user-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/documents/health {
        proxy_pass http://document-service:8002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/documents/ {
        proxy_pass http://document-service:8002/documents/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/query/notifications {
        proxy_pass http://query-service:8001/notifications;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    location /api/query/query {
        proxy_pass http://query-service:8001/query;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    location /api/query/ {
        proxy_pass http://query-service:8001/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/hr/ {
        proxy_pass http://hr-service:8004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/mcp/ {
        proxy_pass http://mcp-service:8003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────── Frontend (Nuxt 4 SSR) — CÙNG origin với /api/* nên KHÔNG CORS ───────────────
    # admin app dưới sub-path /admin/ (Nuxt base=/admin/). KHÔNG trailing slash ở proxy_pass
    # để giữ nguyên prefix /admin/ chuyển xuống Nuxt (assets ra /admin/_nuxt/...).
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://frontend-admin:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Nuxt SSR có thể dùng WebSocket (dev) / SSE — cho qua an toàn.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }

    # chat app ở root. Catch-all: mọi path không khớp /api/* hay /admin/ -> chat SSR.
    location / {
        proxy_pass http://frontend-chat:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

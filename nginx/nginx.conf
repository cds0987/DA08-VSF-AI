# ⚠️ NGUỒN CHUẨN = file này trong git. KHÔNG sửa tay nginx.conf trên VM:
#    mỗi lần deploy chạy `git reset --hard` -> mọi sửa tay trên VM bị GHI ĐÈ.
#    Mọi thay đổi (gồm CORS) phải sửa ở đây -> commit -> để CI/CD deploy.
#
# CORS: FE (/, /admin/) và /api/* CÙNG đi qua nginx :80 -> same-origin -> trình duyệt
# KHÔNG kích hoạt CORS. Vì vậy KHÔNG thêm Access-Control-* ở đây (tránh trùng header
# với CORSMiddleware của backend + tránh phản chiếu $http_origin kèm credentials).

# WebSocket/SSE upgrade helper: Connection = "upgrade" khi có header Upgrade, "" nếu không.
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# query-service SCALE NGANG: round-robin qua 6 replica (mỗi replica 1 uvicorn process = SSE an toàn,
# tránh lỗi --workers đa-process "peer closed"). proxy_pass tới upstream-name hành xử y hệt hostname
# (không gotcha biến/URI). Replica chết -> nginx tự bỏ qua (max_fails) -> KHÔNG kéo sập.
# e2-custom-16: 6 replica chia tải event-loop+DB ở 150-burst heavy (trước 2 replica pegged 2 core).
upstream query_pool {
    server query-service:8001   max_fails=3 fail_timeout=15s;
    server query-service-2:8001 max_fails=3 fail_timeout=15s;
    server query-service-3:8001 max_fails=3 fail_timeout=15s;
    server query-service-4:8001 max_fails=3 fail_timeout=15s;
    server query-service-5:8001 max_fails=3 fail_timeout=15s;
    server query-service-6:8001 max_fails=3 fail_timeout=15s;
    server query-service-7:8001 max_fails=3 fail_timeout=15s;
    server query-service-8:8001 max_fails=3 fail_timeout=15s;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    location /healthz {
        return 200 'ok';
        add_header Content-Type text/plain;
    }

    location /api/user/ {
        proxy_pass http://user-service:8000/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/documents/health {
        proxy_pass http://document-service:8002/health;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # List documents ở resource-root: map THẲNG /api/documents/ -> /documents (KHÔNG
    # trailing) để tránh FastAPI 307 (/documents/ -> /documents) — redirect đó trả Location
    # /documents rồi bị nginx route về frontend (HTML) thay vì document-service.
    location = /api/documents/ {
        proxy_pass http://document-service:8002/documents;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/documents/ {
        proxy_pass http://document-service:8002/documents/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/query/notifications {
        proxy_pass http://query_pool/notifications;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    location /api/query/query {
        proxy_pass http://query_pool/query;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
        add_header X-Accel-Buffering no;
    }

    location /api/query/ {
        proxy_pass http://query_pool/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/hr/ {
        proxy_pass http://hr-service:8004/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /api/mcp/ {
        proxy_pass http://mcp-service:8003/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─────────────── Frontend (Nuxt 4 SSR) — CÙNG origin với /api/* nên KHÔNG CORS ───────────────
    # admin app dưới sub-path /admin/ (Nuxt base=/admin/). KHÔNG trailing slash ở proxy_pass
    # để giữ nguyên prefix /admin/ chuyển xuống Nuxt (assets ra /admin/_nuxt/...).
    location = /admin {
        return 301 /admin/;
    }

    location /admin/ {
        proxy_pass http://frontend-admin:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Nuxt SSR có thể dùng WebSocket (dev) / SSE — cho qua an toàn.
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }

    # chat app ở root. Catch-all: mọi path không khớp /api/* hay /admin/ -> chat SSR.
    location / {
        proxy_pass http://frontend-chat:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

# ─────────── Langfuse dashboard cho team — subdomain riêng + Basic Auth ───────────
# vsfchat.cloud đi qua Cloudflare (proxied) -> TLS do Cloudflare lo, origin nginx nhận :80.
# Thêm DNS proxied langfuse.vsfchat.cloud -> IP ngoài VM (TRỎ CÙNG IP với record
# vsfchat.cloud; IP ephemeral nên lấy từ GCP natIP, đừng hardcode/chép docs cũ).
# nginx route theo Host vào block này. KHÔNG mở port mới: tái dùng 80/443 sẵn có
# -> firewall vẫn chỉ 80/443/22.
#
# Langfuse là Next.js -> KHÔNG chạy được sub-path (vỡ asset/redirect) nên phải subdomain
# (ngồi ở root). Service nội bộ vẫn gửi trace qua http://langfuse:3000 (mạng compose, KHÔNG
# qua đây) -> Basic Auth ở block này CHỈ chắn người xem dashboard, KHÔNG ảnh hưởng ingest.
#
# Basic Auth FAIL-CLOSED: .htpasswd render từ GitHub Secret LANGFUSE_BASIC_AUTH_HTPASSWD lúc
# deploy (render-secrets.sh). Secret RỖNG/THIẾU -> file rỗng -> nginx 401 MỌI request = không
# ai vào được = "không có password thì off". Có password (htpasswd -nbB) -> nhập đúng mới vào.
server {
    listen 80;
    server_name langfuse.vsfchat.cloud;

    client_max_body_size 50M;

    auth_basic "Langfuse VSF - nhap mat khau";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Docker embedded DNS + proxy_pass QUA BIẾN -> nginx KHÔNG resolve 'langfuse' lúc start
    # (nginx không depends_on langfuse, có chủ đích). langfuse chết -> subdomain này trả 502
    # nhưng nginx VẪN start + cổng 80 (chat/admin/api) KHÔNG bị kéo sập.
    resolver 127.0.0.11 valid=30s;

    location / {
        set $langfuse_upstream langfuse;
        proxy_pass http://$langfuse_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Public scheme = https (Cloudflare TLS); origin hop là http -> ép https để
        # NextAuth/Langfuse sinh callback URL + cookie 'Secure' đúng.
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

# ─────────── Grafana (biểu đồ ai-router per-key) — subdomain + Basic Auth ───────────
# Pattern GIỐNG block langfuse. Grafana chạy nội bộ compose (KHÔNG expose host port). DNS proxied
# grafana.vsfchat.cloud -> CÙNG IP với vsfchat.cloud/langfuse. KHÔNG mở port mới (tái dùng 80/443).
# Basic Auth TÁI DÙNG .htpasswd của langfuse (cùng mật khẩu) -> KHÔNG cần secret/render mới.
# Grafana đặt GF_AUTH_ANONYMOUS (Viewer) nên sau Basic Auth là xem dashboard ngay, không login.
server {
    listen 80;
    server_name grafana.vsfchat.cloud;

    client_max_body_size 50M;

    auth_basic "Grafana VSF - nhap mat khau";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Docker embedded DNS + proxy_pass QUA BIẾN -> nginx start được dù grafana chưa lên
    # (không depends_on). grafana chết -> subdomain này 502, cổng 80 chính KHÔNG sập.
    resolver 127.0.0.11 valid=30s;

    location / {
        set $grafana_upstream grafana;
        proxy_pass http://$grafana_upstream:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 300s;
    }
}

# ─────────── Qdrant dashboard cho team — subdomain riêng + Basic Auth ───────────
# Pattern GIỐNG block langfuse phía trên. Qdrant chạy nội bộ compose (KHÔNG expose host
# port): dashboard SPA ở /dashboard, REST API ở root, cùng cổng 6333. Thêm DNS proxied
# qdrant.vsfchat.cloud -> CÙNG IP với vsfchat.cloud/langfuse. KHÔNG mở port mới.
#
# ⚠ KHÁC langfuse: Qdrant KHÔNG có login riêng -> Basic Auth ở đây là lớp bảo vệ DUY NHẤT
#   và nó chắn CẢ REST API (POST/PUT/DELETE) -> ai có pass = full quyền đọc/xóa collection.
#   Dùng .htpasswd-qdrant RIÊNG (không share với langfuse).
#
# Basic Auth FAIL-CLOSED: .htpasswd-qdrant render từ GitHub Secret QDRANT_BASIC_AUTH_HTPASSWD
# lúc deploy. Secret RỖNG/THIẾU -> file rỗng -> nginx 401 mọi request = dashboard KHÓA.
#
# resolver + proxy_pass QUA BIẾN -> nginx KHÔNG resolve 'qdrant' lúc start (không depends_on)
# -> qdrant chết thì subdomain 502 nhưng cổng 80 (chat/admin/api) VẪN sống.
server {
    listen 80;
    server_name qdrant.vsfchat.cloud;

    client_max_body_size 50M;

    auth_basic "Qdrant VSF - nhap mat khau";
    auth_basic_user_file /etc/nginx/.htpasswd-qdrant;

    resolver 127.0.0.11 valid=30s;

    location / {
        set $qdrant_upstream qdrant;
        proxy_pass http://$qdrant_upstream:6333;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
    }
}

# NATS server config for the RAG Chatbot broker.
#
# DevOps: mount this file into the NATS container and start nats-server with:
#   nats-server -c /etc/nats/jetstream.conf
#
# This file intentionally contains no secrets.
# Do not configure `rag.search` in JetStream; it is core NATS request-reply only.

server_name: rag-chatbot-nats
port: 4222
http_port: 8222

jetstream {
  store_dir: "/data/jetstream"
  max_mem_store: 256MB
  max_file_store: 10GB
}

# ---------------------------------------------------------------------------
# Stream bootstrap
# ---------------------------------------------------------------------------
# nats-server config enables JetStream and storage, but streams are normally
# created through the NATS CLI/API after the server is running. Keep the stream
# definitions here as the operational contract; DevOps can run the commands
# once during environment bootstrap without changing docker-compose.yml.
#
# MVP choice:
# - DOC_EVENTS uses limits retention for `doc.ingest`, `doc.status`, and
#   `doc.access` together so status/access events remain replayable for new or
#   recovering durable consumers. `doc.ingest` behaves like a work queue by
#   using one durable RAG Worker consumer group.
# - If ingestion later needs strict workqueue retention independent from
#   replayable ACL/status events, split `doc.ingest` into a dedicated
#   DOC_INGEST stream with workqueue retention.
# - NOTIFY_EVENTS uses shorter retention because online SSE notification
#   delivery is transient and history is stored by Query Service.
#
# Create or update DOC_EVENTS:
#   nats stream add DOC_EVENTS \
#     --subjects "doc.ingest,doc.status,doc.access" \
#     --storage file \
#     --retention limits \
#     --discard old \
#     --max-age 7d \
#     --dupe-window 2m \
#     --ack
#
# Create or update NOTIFY_EVENTS:
#   nats stream add NOTIFY_EVENTS \
#     --subjects "notify.doc_new" \
#     --storage file \
#     --retention limits \
#     --discard old \
#     --max-age 3d \
#     --dupe-window 2m \
#     --ack
#
# Suggested durable consumers, created by services or bootstrap automation:
#   DOC_EVENTS / RAG_WORKER_INGEST:
#     subject filter: doc.ingest
#     ack policy: explicit
#     deliver policy: all
#     max deliver: 10
#
#   DOC_EVENTS / DOCUMENT_SERVICE_STATUS:
#     subject filter: doc.status
#     ack policy: explicit
#     deliver policy: all
#     max deliver: 10
#
#   DOC_EVENTS / QUERY_SERVICE_DOC_ACCESS:
#     subject filter: doc.access
#     ack policy: explicit
#     deliver policy: all
#     max deliver: 20
#
#   NOTIFY_EVENTS / QUERY_SERVICE_NOTIFY_DOC_NEW:
#     subject filter: notify.doc_new
#     ack policy: explicit
#     deliver policy: new or all, depending on whether offline replay is wanted
#     max deliver: 5

# Auto-load dashboard JSON từ /var/lib/grafana/dashboards (mount từ repo).
apiVersion: 1
providers:
  - name: ai-router
    orgId: 1
    folder: AI Router
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /var/lib/grafana/dashboards
      foldersFromFilesStructure: false

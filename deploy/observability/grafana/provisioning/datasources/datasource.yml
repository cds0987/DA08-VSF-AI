# Auto-provision datasource Prometheus (uid cố định 'prometheus' để dashboard tham chiếu).
apiVersion: 1
datasources:
  - name: Prometheus
    uid: prometheus
    type: prometheus
    access: proxy
    url: http://prometheus:9090
    isDefault: true
    editable: false

  # Tempo — trace backend. trace_id từ log/biểu đồ -> mở trace ở đây.
  - name: Tempo
    uid: tempo
    type: tempo
    access: proxy
    url: http://tempo:3200
    editable: false
    jsonData:
      tracesToLogsV2:
        datasourceUid: loki          # từ trace -> log cùng trace_id
        filterByTraceID: true
      serviceMap:
        datasourceUid: prometheus

  # Loki — log backend. log cùng trace_id (LogQL).
  - name: Loki
    uid: loki
    type: loki
    access: proxy
    url: http://loki:3100
    editable: false
    jsonData:
      derivedFields:
        - name: trace_id
          matcherRegex: '"trace_id":"(\w+)"'
          url: '$${__value.raw}'
          datasourceUid: tempo        # từ log -> trace cùng trace_id

# metric-contract — HỢP ĐỒNG tên + label metric (MOSA). Panel/dashboard CHỈ query metric
# khai ở đây -> đổi tên/label phải qua review. Thêm metric = +1 entry. Router phát qua
# Metrics.inc() (schemaless) nên thêm metric KHÔNG sửa observability.py.
version: 1

namespaces:
  airouter:
    description: "AI Router — routing/cost/quota/strategy."
    metrics:
      # ── per-key × model (commit banded_rotation): nguồn cho table 'Key×Model×Capability' ──
      - { name: airouter_calls_total,     type: counter, labels: [key_id, secret_env, model, capability, tier, provider, status] }
      - { name: airouter_tokens_total,    type: counter, labels: [key_id, secret_env, model, capability, tier, provider] }
      - { name: airouter_cost_usd_total,  type: counter, labels: [key_id, secret_env, model, capability, tier, provider] }
      # ── strategy observ (quan sát banded/save chạy) ──
      - { name: airouter_band_rotation_total, type: counter, labels: [scope, tier] }
      - { name: airouter_save_mode_total,     type: counter, labels: [capability] }
      - { name: airouter_key_429_total,       type: counter, labels: [key_id, kind] }   # kind=quota|rate
      # ── leading indicator (đã có) ──
      - { name: airouter_resolve_total,      type: counter, labels: [capability, tier, provider] }
      - { name: airouter_fallback_total,     type: counter, labels: [capability, tier] }
      - { name: airouter_resolve_fail_total, type: counter, labels: [capability, reason] }
      # ── drift catalog: model provider trả KHÔNG có trong catalog (WS-A) -> cần rebuild catalog ──
      - { name: airouter_model_unmatched_total, type: counter, labels: [model, capability] }
      # ── per-key gauge (Redis snapshot) ──
      - { name: airouter_key_tokens_today,   type: gauge, labels: [key_id, secret_env, provider, tier] }
      - { name: airouter_key_remaining,      type: gauge, labels: [key_id, secret_env, provider, tier] }
      - { name: airouter_key_cost_month_usd, type: gauge, labels: [key_id, secret_env, provider, tier] }
      - { name: airouter_key_cooldown,       type: gauge, labels: [key_id, secret_env, provider, tier] }
      - { name: airouter_key_limit,          type: gauge, labels: [key_id, secret_env, provider, tier] }   # trần quota/ngày (free-tier)
      - { name: airouter_key_rpm,            type: gauge, labels: [key_id, secret_env, provider, tier] }   # RPM hiện tại/key (xem tải đều)
      # ── meta gauge ──
      - { name: airouter_keys_total,         type: gauge,   labels: [] }   # tổng key đăng ký
      # ── histogram latency/ttfc (bảng 'Trải nghiệm user'): _bucket/_sum/_count chuẩn Prometheus.
      #    TTFT = time-to-first-chunk từ provider; latency = tổng 1 call. p95/p99 = histogram_quantile.
      - { name: airouter_ttfc_seconds_bucket,         type: histogram, labels: [capability, provider, le] }
      - { name: airouter_ttfc_seconds_sum,            type: histogram, labels: [capability, provider] }
      - { name: airouter_ttfc_seconds_count,          type: histogram, labels: [capability, provider] }
      - { name: airouter_call_latency_seconds_bucket, type: histogram, labels: [capability, provider, le] }
      - { name: airouter_call_latency_seconds_sum,    type: histogram, labels: [capability, provider] }
      - { name: airouter_call_latency_seconds_count,  type: histogram, labels: [capability, provider] }

  vsf:
    description: "RED per-service từ OTel spanmetrics connector (otel-collector)."
    metrics:
      - { name: vsf_calls_total,                  type: counter,   labels: [service_name, status_code] }
      - { name: vsf_duration_milliseconds_bucket, type: histogram, labels: [service_name, le] }

  node:
    description: "Hạ tầng VM từ node-exporter (CPU/RAM/đĩa)."
    metrics:
      - { name: node_cpu_seconds_total,      type: counter, labels: [mode] }
      - { name: node_memory_MemAvailable_bytes, type: gauge, labels: [] }
      - { name: node_memory_MemTotal_bytes,  type: gauge,   labels: [] }
      - { name: node_filesystem_avail_bytes, type: gauge,   labels: [mountpoint] }
      - { name: node_filesystem_size_bytes,  type: gauge,   labels: [mountpoint] }

  qdrant:
    description: "Vector store Qdrant — RPS/latency/error/collection. Scrape qdrant:6333/metrics (WS-H).
      Tên metric theo /metrics chuẩn của Qdrant (gauge avg-duration, KHÔNG có histogram bucket)."
    metrics:
      - { name: app_info,                          type: gauge,   labels: [name, version] }
      - { name: collections_total,                 type: gauge,   labels: [] }
      - { name: collections_vector_total,          type: gauge,   labels: [] }
      - { name: pending_operations,                type: gauge,   labels: [] }
      - { name: rest_responses_total,              type: counter, labels: [method, endpoint, status] }
      - { name: rest_responses_fail_total,         type: counter, labels: [method, endpoint, status] }
      - { name: rest_responses_avg_duration_seconds, type: gauge, labels: [method, endpoint] }
      - { name: memory_resident_bytes,             type: gauge,   labels: [] }

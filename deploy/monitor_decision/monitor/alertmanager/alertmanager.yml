# Alertmanager — Phase 1 observability. Nhận alert từ Prometheus, gom + gửi Slack.
# Webhook đọc từ FILE (api_url_file) để KHÔNG vỡ khi chưa cấu hình: chưa có file ->
# Alertmanager vẫn khởi động, chỉ là alert không gửi đi (xem được ở Prometheus/Grafana).
# Cấu hình thật: tạo file /etc/alertmanager/secrets/slack_webhook từ secret
# ALERTMANAGER_SLACK_WEBHOOK (render qua deploy/scripts/render-secrets.sh).
route:
  receiver: devops-slack
  group_by: ['alertname', 'severity', 'service']
  group_wait: 30s          # gom alert mới trong 30s rồi gửi 1 lần
  group_interval: 5m       # alert mới cùng nhóm: chờ 5m
  repeat_interval: 4h      # alert chưa giải quyết: nhắc lại mỗi 4h
  routes:
    - matchers: [severity="P1"]
      receiver: devops-slack
      group_wait: 10s        # P1 gửi nhanh hơn
      repeat_interval: 1h

receivers:
  - name: devops-slack
    slack_configs:
      - api_url_file: /etc/alertmanager/secrets/slack_webhook
        channel: '#ops-alerts'   # đổi tên channel tại đây
        send_resolved: true
        title: '[{{ .CommonLabels.severity }}] {{ .CommonLabels.alertname }} — {{ .CommonLabels.service }}'
        text: >-
          {{ range .Alerts }}*{{ .Annotations.summary }}*
          {{ .Annotations.description }}
          Runbook: {{ .Annotations.runbook }}
          {{ end }}

# Ức chế nhiễu: khi P1 đang kêu thì nén P2 cùng service (tránh spam khi sự cố lớn).
inhibit_rules:
  - source_matchers: [severity="P1"]
    target_matchers: [severity="P2"]
    equal: ['service']

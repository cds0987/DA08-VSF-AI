active: ${PIPELINE_PROFILE:-baseline}

profiles:
  baseline:
    # ── Cấp SERVICE (không thuộc tool nào) ───────────────────────────────
    common:
      ai_mode: ${AI_PROVIDER:-offline}
      timeout: 60
      max_retries: 5

    # Runtime/auth của MCP endpoint. Đọc env qua ${...} y như các field khác,
    # nên chỉ cần set biến môi trường (hoặc deploy/env/mcp-service.env) là đủ.
    server:
      host: ${MCP_HOST:-0.0.0.0}
      port: ${MCP_PORT:-8003}
      log_level: ${LOG_LEVEL:-INFO}
      app_env: ${APP_ENV:-development}
      # Shared-secret cho auth app-layer. Trống = auth TẮT (fail-open).
      internal_token: ${MCP_INTERNAL_TOKEN:-}

    # ── Cấp TOOL: mọi config thuộc tool nào thì nest hẳn vào tool đó ──────
    # mcp-service = THIN search interface: embed + vector search là việc của
    # rag-worker (POST /api/search, owner của embed model + collection contract).
    # Tool rag_search chỉ giữ: search (endpoint rag-worker) + reranker + retrieval.
    rag_search:
      enabled: ${TOOL_RAG_SEARCH_ENABLED:-1}
      search:
        rag_worker_url: ${RAG_WORKER_URL:-http://rag-worker:8000}
        timeout_seconds: ${RAG_SEARCH_TIMEOUT_SECONDS:-30}
      reranker:
        impl: ${RERANK_PROVIDER:-lexical}
        model: ${RERANK_MODEL:-gpt-4o-mini}
        base_url: ${RERANK_BASE_URL:-}
        # cohere rerank đi QUA ai-router -> bearer = token gateway (AIROUTER_INTERNAL_TOKEN),
        # KHÔNG phải key OpenRouter (key OpenRouter cho cohere nằm trong pool 5 key của ai-router).
        api_key: ${AIROUTER_INTERNAL_TOKEN:-}
        timeout_seconds: ${RERANK_TIMEOUT_SECONDS:-30}
        params:
          batch_size: ${RERANK_BATCH_SIZE:-8}
          passage_chars: ${RERANK_PASSAGE_CHARS:-800}
      retrieval:
        top_k_candidates: ${SEARCH_TOP_K:-20}
        rerank_top_k: ${RERANK_TOP_K:-5}
        rerank_threshold: ${RERANK_THRESHOLD:-0.05}
        rerank_max_per_doc: ${RERANK_MAX_PER_DOC:-0}     # 0=tắt; >0 = đa dạng doc (chống 1-doc-thống-trị)
        rerank_diversity_pool: ${RERANK_DIVERSITY_POOL:-3}

    # Quy đổi ngày tương đối -> YYYY-MM-DD (giờ VN). Pure-compute, BẬT mặc định
    # (không secret/dependency) — tắt qua TOOL_RESOLVE_DATE_ENABLED=0 nếu cần.
    resolve_date:
      enabled: ${TOOL_RESOLVE_DATE_ENABLED:-1}

    hr_query:
      enabled: ${TOOL_HR_QUERY_ENABLED:-0}
      params:
        hr_service_url: ${HR_SERVICE_URL:-http://hr-service:8004}
        internal_token: ${HR_SERVICE_INTERNAL_TOKEN:-}

    # Hàng đợi duyệt của approver (read-only). Bật cùng điều kiện hr_query (cần
    # hr-service). Approve/reject KHÔNG ở MCP — là REST có xác nhận ở FE.
    leave_approvals:
      enabled: ${TOOL_LEAVE_APPROVALS_ENABLED:-0}
      params:
        hr_service_url: ${HR_SERVICE_URL:-http://hr-service:8004}
        internal_token: ${HR_SERVICE_INTERNAL_TOKEN:-}

    # Danh mục loại nghỉ phép chính thức (read-only) — trả lời "có loại nghỉ nào".
    leave_types:
      enabled: ${TOOL_LEAVE_TYPES_ENABLED:-0}
      params:
        hr_service_url: ${HR_SERVICE_URL:-http://hr-service:8004}
        internal_token: ${HR_SERVICE_INTERNAL_TOKEN:-}

    # WRITE đơn nghỉ phép (create/update/cancel). TẮT mặc định — bật bằng
    # TOOL_LEAVE_WRITE_ENABLED=1 khi query-service đã có confirmation gate.
    leave_write:
      enabled: ${TOOL_LEAVE_WRITE_ENABLED:-0}
      params:
        hr_service_url: ${HR_SERVICE_URL:-http://hr-service:8004}
        internal_token: ${HR_SERVICE_INTERNAL_TOKEN:-}

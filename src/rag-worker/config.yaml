active: ${PIPELINE_PROFILE:-baseline}

profiles:
  baseline:
    common:
      ai_mode: ${AI_PROVIDER:-offline}
      timeout: 60
      max_retries: 5

    embedder:
      model: ${EMBED_MODEL:-text-embedding-3-small}
      base_url: ${EMBED_BASE_URL:-}
      api_key: ${OPENAI_API_KEY:-}
      dimension: ${EMBED_DIMENSION:-}

    captioner:
      impl: ${CAPTIONER_IMPL:-provider}
      model: ${CAPTION_MODEL:-gpt-4o-mini}
      base_url: ${CAPTION_BASE_URL:-}
      api_key: ${CAPTION_API_KEY:-}
      params:
        max_chars: ${CAPTION_MAX_CHARS:-6000}

    # NOTE: rag-worker = INGEST-ONLY. KHÔNG có reranker/retrieval (việc của mcp-service).
    parser:
      impl: ${PARSER_IMPL:-local}
      params:
        max_workers: ${PARSER_MAX_WORKERS:-2}
      ocr:
        model: ${OCR_MODEL:-gpt-4o-mini}
        base_url: ${OCR_BASE_URL:-}
        api_key: ${OCR_API_KEY:-}

    chunker:
      impl: heading_sections
      params:
        parent_max_words: ${SECTION_MAX_WORDS:-220}
        child_max_words: ${CHILD_MAX_WORDS:-90}
        child_overlap_words: ${CHILD_OVERLAP_WORDS:-15}

    vector_store:
      impl: ${VECTOR_DB_PROVIDER:-qdrant}
      params:
        collection: ${VECTOR_COLLECTION:-rag_chatbot}
        url: ${VECTOR_DB_URL:-}
        api_key: ${VECTOR_DB_API_KEY:-}

    vectorstore_contract:
      provider: ${VECTOR_DB_PROVIDER:-qdrant}
      collection: ${VECTOR_COLLECTION:-rag_chatbot}
      embed_model: ${EMBED_MODEL:-text-embedding-3-small}

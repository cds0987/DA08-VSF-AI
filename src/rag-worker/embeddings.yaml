# Active embed models — multi-collection ghi (mỗi model = 1 collection).
#
# APPEND-MIGRATION (giống alembic forward-only): THÊM model = thêm dòng vào danh sách
# -> collection MỚI tự tạo (auto_migrate) + backfill re-embed từ MD cache. XÓA model
# khỏi danh sách KHÔNG xóa collection cũ (chỉ ngừng GHI tiếp; GC thủ công sau verify).
#
# Mỗi model -> collection {VECTOR_COLLECTION}__{model_tag}__d{native_dim}[__s{sparse}].
# dim = native (core_engine.contract.resolve_dimension); model phải có trong EMBED_MODELS.
#
# ANCHOR model (= EMBED_MODEL env) — KHÔNG privileged trong shard. Shard chia ĐỀU: mọi model
# trong danh sách là PEER ngang nhau (mỗi cái nhận ~N/len, read query CẢ N + merge). "Anchor" chỉ
# neo 3 thứ kỹ thuật: embedder bootstrap của engine + fingerprint runtime + fallback collection
# nếu TẮT shard-read. KHÔNG model nào serve nhiều hơn. (Lịch sử: "anchor" là di sản single-collection
# — chính lớp giả định 1-model này từng đẻ ra bug router ép-qwen8b; nay foundation đa-model thật,
# gác bởi infra/ci/embed_model_lint.py.) Anchor luôn được gộp vào danh sách dù có liệt kê hay không.
version: 1
# Chế độ ghi multi-collection:
#   replicate (mặc định) -> mỗi doc embed vào MỌI collection (5/5). Backward-compat.
#   shard               -> mỗi doc embed vào CHỈ 1 collection chọn round-robin DETERMINISTIC
#                          theo hash(document_id) % len(pool) -> corpus chia đều ~N/5,
#                          embed throughput ×5. READ tự query 5 collection + merge + rerank.
# Pool shard = primary (qwen8b, EMBED_MODEL) + 4 model dưới (primary cũng nhận 1/5).
# Override nhanh bằng env MULTI_EMBED_MODE (ưu tiên cao hơn field này). READ-merge bật mặc
# định khi shard; tắt bằng MULTI_EMBED_SHARD_READ=0. Đổi replicate->shard: doc CŨ vẫn nằm ở
# mọi collection (giữ), doc MỚI chỉ vào 1 collection; read-merge phủ cả hai.
mode: shard
embed_models:
  - qwen/qwen3-embedding-8b           # PRIMARY hiện tại (4096)
  - baai/bge-m3                       # 1024 (ctx 8192)
  - openai/text-embedding-3-small     # 1536 (qua OpenAI embed_oai, ctx 8191)
  - perplexity/pplx-embed-v1-0.6b     # 1024 (ctx 4096)
  # GỠ intfloat/multilingual-e5-large 2026-06-28: ctx CHỈ 512 — nhỏ nhất, mắt xích yếu
  # (3 model còn lại ≥4096). Hiện chunk ~90 token nên vẫn vừa, nhưng bỏ để an toàn khi chunk
  # lớn dần + giảm 1 embed/query (latency shard-read). Collection cũ GC khi clear.

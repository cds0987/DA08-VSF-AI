# MOSA LLM profiles — map mỗi node gọi LLM của LangGraph -> adapter + cấu hình model.
#
# HOT-CONFIG: sửa file này để đổi model/adapter/effort cho từng node, KHÔNG sửa code.
# Thiếu file / sai cú pháp / node không khai báo / adapter chưa đăng ký -> loader tự
# fallback an toàn về adapter 'standard' (xem loader.py) -> KHÔNG làm vỡ service.
#
# - adapter:          tên đã @register (standard | reasoning_oai | reasoning_or)
# - capability:       chuỗi gửi cho ai-router khi route (OPENAI_BASE_URL set) -> router map -> model thật
# - models:           danh sách model THẬT của node (dùng khi gọi trực tiếp / để tài liệu hoá)
# - reasoning_effort: low | medium | high (chỉ adapter reasoning_* dùng; standard bỏ qua)
# - max_output_tokens: trần token OUTPUT riêng cho node (HOT-CONFIG). Với reasoning model, trần
#     này gồm CẢ token "suy nghĩ" — node nghĩ nhiều (planner) cần trần CAO, không thì nghĩ hết
#     trần -> không kịp ra JSON -> retry. Thiếu -> dùng trần chung LLM_MAX_OUTPUT_TOKENS (1500).
version: 1

defaults:
  adapter: standard
  reasoning_effort: null
  max_output_tokens: null            # null -> dùng trần chung (settings.llm_max_output_tokens)

nodes:
  # Phân loại. ⚠️ capability = think (gpt-5.4-mini) CHỨ KHÔNG phải triage (gpt-4o-mini):
  # e2e/deploy smoke lộ ra gpt-4o-mini phân loại SAI (RAG -> meta) -> regression. Giữ triage
  # trên cùng model như think để KHÔNG đổi hành vi prod. Muốn hạ model triage: phải eval
  # chất lượng phân loại trước rồi đổi capability ở đây.
  triage:
    adapter: standard
    capability: think

  # Node CHÍNH (planner): chọn tool + tổng hợp.
  # MẶC ĐỊNH 'standard' = hành vi cũ (gửi temperature, KHÔNG reasoning_effort).
  # ⚠️ KHÔNG để reasoning_oai ở đây nếu think còn bind tools trên chat.completions:
  # OpenAI 400 "Function tools with reasoning_effort not supported ... use /v1/responses".
  # Muốn dùng reasoning cho think: hoặc qua /v1/responses, hoặc bỏ effort (adapter tự bỏ
  # khi có tools — xem reasoning_oai). Đổi adapter ở đây sau khi eval parity xanh.
  think:
    adapter: standard
    capability: think
    # Dùng cho luồng react (fallback) + leave_action. Reasoning model: token nghĩ + content CHUNG
    # 1 trần -> để 3000 cho đủ chỗ, tránh nghĩ hết trần -> cụt.
    max_output_tokens: 3000

  # ── MOSA mỗi BƯỚC = 1 capability RIÊNG -> đổi model chỉ sửa routing.yaml (ai-router), KHÔNG
  # sửa code. Đây là "bảng điều khiển" để quét tìm bộ model tối ưu sau này. ───────────────────
  # Bước LẬP KẾ HOẠCH (orchestrate). plan -> deepseek-v4-flash (routing.yaml). KHÔNG cắt reasoning
  # (để model nghĩ thoải mái + STREAM ra UI); vấn đề hiển thị giải quyết ở tầng SẮP XẾP (FE), không
  # phải giảm nghĩ. max cao để JSON không cụt. (adapter openrouter_effort vẫn có sẵn để hot-config
  # cắt nghĩ per-node SAU NÀY nếu cần — hiện KHÔNG dùng.)
  plan:
    adapter: openrouter_effort     # was: standard — cắt độ nghĩ deepseek (reasoning:{effort})
    capability: plan
    # effort=low: deepseek nghĩ GỌN (~5s thay vì 22s với 1500+ token CoT lan man) mà vẫn đủ chất
    # cho việc route+decompose. CoT VẪN stream ra panel Orchestrator (adapter surfaces_reasoning).
    reasoning_effort: low
    max_output_tokens: 3000

  # Bước THINK 2 = TỔNG HỢP + VERIFY. Mặc định synth -> deepseek-v4-flash; muốn chất hơn đổi
  # routing.yaml synth.paid = deepseek-v4-pro. Trần cao cho reasoning + bản tổng hợp.
  synth:
    adapter: standard
    capability: synth
    max_output_tokens: 3000

  # Node GỘP verify_answer (tổng hợp+kiểm tra+viết) dùng capability `answer`. 1 call vừa REASONING
  # (suy nghĩ ẩn) vừa viết câu trả lời -> trần phải gồm CẢ token nghĩ + answer -> nâng 4000 để
  # không CỤT (trước 2500 chỉ đủ answer, nay thêm reasoning của bước gộp).
  answer:
    adapter: standard
    capability: answer
    max_output_tokens: 4000

  # Guardrail LLM-judge (input/output).
  guardrail:
    adapter: standard
    capability: guardrail

  # LLM-rerank (mcp-service đọc cùng manifest concept; ở đây để query-service tham chiếu).
  rerank:
    adapter: standard
    capability: rerank

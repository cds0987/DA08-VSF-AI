# AI Router — routing table (file hot-reload; counter ở Redis). PLAN §13.
# Thêm capability / đổi thuật toán / tinh chỉnh ngưỡng = sửa file này, KHÔNG sửa code.
version: 1

selector:
  impl: banded_rotation             # ❖ DEFAULT toàn hệ: xoay key mỗi 250K token (PLAN §11.2)
  params:
    band_tokens: 250000             # key active phục vụ >= 250K (est) -> xoay key kế
    save_mode:                      # cạn MỌI tier -> degrade xiaomi/mimo-v2.5 (OpenRouter, rẻ + reasoning), KHÔNG 503
      enabled: true
      model: xiaomi/mimo-v2.5
      tier: paid
      band_tokens: 250000

tiers:
  - { name: free_oai,  endpoint_default: chat }
  - { name: free_or,   endpoint_default: chat }
  - { name: paid,      endpoint_default: chat }
  - { name: embed_oai, endpoint_default: embeddings }
  - { name: embed_or,  endpoint_default: embeddings }   # embeddings qua OpenRouter (qwen)

# alias service truyền qua field `model` -> capability
aliases:
  auto: answer
  gpt-5.4-nano: answer
  default: answer
  # rag-worker gửi model THẬT (= embed_model fingerprint collection) -> map về capability embed.
  qwen/qwen3-embedding-4b: embed
  # mcp gửi model THẬT cohere/rerank-4-pro -> capability rerank_api (Cohere /rerank endpoint).
  cohere/rerank-4-pro: rerank_api

# Bậc thang: OpenAI free -> OpenRouter free -> paid (PLAN §5.1). Model free_or có thể
# đổi/biến mất (OpenRouter xoay free) -> selector tự bỏ qua tier nếu model không còn trong catalog.
capabilities:
  answer:                           # câu trả lời cuối (split answer node) -> GIAO TOÀN BỘ
                                    # cho deepseek qua OpenRouter, xoay API key mỗi 150K token.
    tiers: [paid]                   # paid = OpenRouter (deepseek). KHÔNG dùng OpenAI free.
    models:
      paid:                           # CHIA TẢI //hóa: deepseek + xiaomi RR 50/50 -> mỗi upstream
        - deepseek/deepseek-v4-flash   # GPU nửa tải -> queue nông -> p99 ttfc thấp (gốc 12s = queue upstream)
        - xiaomi/mimo-v2.5
    selector:                       # banded_rotation: dính 1 key tới khi phục vụ 150K -> xoay key kế.
      impl: adaptive_balanced       # OpenRouter(deepseek): AIMD tự dò trần qua 429 (không TPM cố định)
      params:
        tpm_per_key: 500000         # chỉ áp cho tier OpenAI; tier OR bỏ qua (dùng AIMD)
        save_mode:                  # cạn slot deepseek -> degrade xiaomi/mimo-v2.5 (rẻ hơn gpt-4o-mini, đa dạng hoá khỏi deepseek).
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 150000
    require_tools: false            # answer node KHÔNG bind tool -> deepseek-flash ok.
    quality_floor: null
  # ── MOSA per-step (ô model độc lập, đổi model tại đây không sửa code) ──────────────────────
  plan:                             # bước LẬP KẾ HOẠCH. flash NHANH HƠN pro (~5s vs 7s) + vẫn
                                    # reason+stream. (Trước dùng 'think'=pro -> 15s+retry.) Muốn
                                    # nâng chất ca khó: đổi paid = deepseek/deepseek-v4-pro.
    tiers: [paid]
    models:
      paid:                           # CHIA TẢI //hóa: deepseek + xiaomi RR 50/50 -> mỗi upstream
        - deepseek/deepseek-v4-flash   # GPU nửa tải -> queue nông -> p99 ttfc thấp (gốc 12s = queue upstream)
        - xiaomi/mimo-v2.5
    selector:
      impl: adaptive_balanced       # OpenRouter(deepseek): AIMD tự dò trần qua 429 (không TPM cố định)
      params:
        tpm_per_key: 500000         # chỉ áp cho tier OpenAI; tier OR bỏ qua (dùng AIMD)
        save_mode:
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 150000
    require_tools: false
    quality_floor: null
  synth:                            # THINK 2 = tổng hợp + verify. flash mặc định; nâng chất:
                                    # đổi paid = deepseek/deepseek-v4-pro (chỉ sửa dòng dưới).
    tiers: [paid]
    models:
      paid:                           # CHIA TẢI //hóa: deepseek + xiaomi RR 50/50 -> mỗi upstream
        - deepseek/deepseek-v4-flash   # GPU nửa tải -> queue nông -> p99 ttfc thấp (gốc 12s = queue upstream)
        - xiaomi/mimo-v2.5
    selector:
      impl: adaptive_balanced       # OpenRouter(deepseek): AIMD tự dò trần qua 429 (không TPM cố định)
      params:
        tpm_per_key: 500000         # chỉ áp cho tier OpenAI; tier OR bỏ qua (dùng AIMD)
        save_mode:
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 150000
    require_tools: false
    quality_floor: null
  triage:                           # phân loại nhanh, rẻ
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  think:                            # triage + planner + execute. PIN 1 MODEL = deepseek-v4-pro
                                    # (probe: tools=OK + reasoning=CÓ) -> reasoning THẬT hiện ra
                                    # ("Lập kế hoạch") + gọi tool được + ỔN ĐỊNH (bỏ blend gpt↔deepseek).
    tiers: [paid]                   # paid = OpenRouter (deepseek-v4-pro). Xoay KEY, KHÔNG xoay model.
    models:
      paid: deepseek/deepseek-v4-pro
    selector:
      impl: adaptive_balanced       # OpenRouter deepseek-pro: AIMD tự dò trần qua 429
      params:
        tpm_per_key: 500000         # OR bỏ qua (AIMD)
        save_mode:                  # cạn slot deepseek -> xiaomi/mimo-v2.5 (rẻ + reasoning, tránh 503).
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 150000
  worker:                           # subagents song song (Orchestrator-Workers) — fetch+phân tích
                                    # PIN gpt-5.4-mini (OpenAI). Xoay 5 key ~2.5M token/key/ngày;
                                    # cạn CẢ 5 key -> degrade gpt-4o-mini (tránh 503). KHÔNG OpenRouter.
    tiers: [free_oai]
    models:
      free_oai: openai/gpt-5.4-mini
    selector:
      impl: adaptive_balanced       # OpenAI gpt-5.4-mini: TPM-headroom (trần token/phút RÕ)
      params:
        tpm_per_key: 500000         # 5 key OpenAI, mỗi key 500K token/phút -> rải đều theo TPM
        save_mode:
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 2500000
  rerank:                           # LLM-as-reranker (chat.completions) — GIỮ cho tương thích cũ.
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  rerank_api:                       # Cohere /rerank endpoint (rerank-4-pro) qua OpenRouter — KHÁC
                                    # rerank LLM ở trên. mcp gọi /v1/rerank; router proxy GIỮ NGUYÊN
                                    # model + request/response Cohere, chỉ chuẩn hoá đi qua gateway.
    tiers: [paid]                   # OpenRouter paid (key trả deepseek dùng chung credit). KHÔNG free.
    endpoint: rerank                # endpoint provider riêng (Cohere /rerank), KHÔNG chat/embeddings
    models:
      paid: cohere/rerank-4-pro
  guardrail:
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  summary:                          # tóm tắt hội thoại (memory) — rẻ, không cần reasoning/tool
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  caption:                          # ảnh -> mô tả (VISION)
    tiers: [free_oai, free_or]
    models:
      free_oai: openai/gpt-4o-mini
      free_or: google/gemma-4-31b-it:free
    require_vision: true
  ocr:                              # ảnh/scan + chart/bảng-vector -> text (VISION)
    tiers: [free_oai]               # CHỈ OpenAI — KHÔNG OpenRouter. gpt-5.4-mini (rẻ, vision tốt).
    models:
      free_oai: openai/gpt-5.4-mini
    selector:                       # xoay 5 key gpt-5.4-mini; cạn CẢ -> degrade gpt-4o-mini (vẫn OpenAI)
      impl: banded_rotation
      params:
        band_tokens: 2500000        # quota/key/ngày -> cạn 1 key xoay key kế (cùng model)
        save_mode:                  # cạn CẢ 5 key -> xiaomi/mimo-v2.5 (OpenRouter, omnimodal hỗ trợ vision)
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 2500000
    require_vision: true
  embed:                            # ⚠️ PIN model cố định (BẪY embedding, PLAN §4b)
    tiers: [embed_or]              # qwen3-embedding-4b qua OpenRouter (rag-worker + query intent)
    pinned_model: qwen/qwen3-embedding-4b

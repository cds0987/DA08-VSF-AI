# AI Router — routing table (file hot-reload; counter ở Redis). PLAN §13.
# Thêm capability / đổi thuật toán / tinh chỉnh ngưỡng = sửa file này, KHÔNG sửa code.
version: 1

selector:
  impl: banded_rotation             # ❖ DEFAULT toàn hệ: xoay key mỗi 250K token (PLAN §11.2)
  params:
    band_tokens: 250000             # key active phục vụ >= 250K (est) -> xoay key kế
    save_mode:                      # cạn MỌI tier -> degrade xiaomi/mimo-v2.5 (OpenRouter, rẻ + reasoning), KHÔNG 503
      enabled: true
      model: xiaomi/mimo-v2.5
      tier: paid
      band_tokens: 250000

tiers:
  - { name: free_oai,  endpoint_default: chat }
  - { name: free_or,   endpoint_default: chat }
  - { name: paid,      endpoint_default: chat }
  - { name: embed_oai, endpoint_default: embeddings }
  - { name: embed_or,  endpoint_default: embeddings }   # embeddings qua OpenRouter (qwen)

# alias service truyền qua field `model` -> capability
aliases:
  auto: answer
  gpt-5.4-nano: answer
  default: answer
  # rag-worker gửi model THẬT (= embed_model fingerprint collection) -> map về capability embed.
  qwen/qwen3-embedding-8b: embed   # 2026-06-27: model active (3 provider, hết engine_overloaded)
  qwen/qwen3-embedding-4b: embed   # giữ alias cũ cho rollback an toàn
  # MULTI-COLLECTION embed (rag-worker ghi mỗi model 1 collection -> gửi model THẬT). Mỗi model
  # -> capability embed_* PIN đúng model + đúng tier provider. KHÔNG đụng 'embed' (qwen8b primary).
  intfloat/multilingual-e5-large: embed_e5large    # OpenRouter (embed_or)
  baai/bge-m3: embed_bgem3                          # OpenRouter (embed_or)
  perplexity/pplx-embed-v1-0.6b: embed_pplx         # OpenRouter (embed_or)
  openai/text-embedding-3-small: embed_te3s         # OpenAI (embed_oai)
  text-embedding-3-small: embed_te3s                # alias ngắn -> cùng capability
  # mcp gửi model THẬT (rerank) -> capability rerank_api (Cohere /rerank endpoint). Giữ cả 2 alias
  # (rolling-deploy an toàn); model THỰC SỰ gọi do rerank_api.paid quyết (hiện = cohere/rerank-v3.5).
  cohere/rerank-v3.5: rerank_api
  cohere/rerank-4-pro: rerank_api

# Bậc thang: OpenAI free -> OpenRouter free -> paid (PLAN §5.1). Model free_or có thể
# đổi/biến mất (OpenRouter xoay free) -> selector tự bỏ qua tier nếu model không còn trong catalog.
capabilities:
  answer:                           # câu trả lời cuối (split answer node) -> GIAO TOÀN BỘ
                                    # cho deepseek qua OpenRouter, xoay API key mỗi 150K token.
    tiers: [paid]                   # paid = OpenRouter. KHÔNG dùng OpenAI free.
    models:
      paid:                              # //HÓA answer 2026-06-26 v2: rải 7 model ĐA-POOL (DeepSeek/Qwen/
                                         # Meta/Zhipu/Tencent) chống queue GPU + deepseek là model CHẬM NHẤT
                                         # (p50 6.3s vs 1.7-3s) -> rải = NHANH hơn. ĐIỀU KIỆN: profiles.yaml
                                         # answer reasoning_effort="off" (reasoning:{enabled:false}) -> mọi
                                         # model nhồi answer vào CONTENT (không reasoning_content rỗng=dump
                                         # raw) + soft-adapter _va_split tách 'BƯỚC 1'. Survey 7×4×3 (đủ/đa-
                                         # nguồn/thiếu/off-topic): empty 0-1/12, split_ok ~12/12, cite 8-12/12.
        - deepseek/deepseek-v4-flash     #   DeepSeek (proven) — off-reasoning 2-4s, cite [1][2] ✓
        - qwen/qwen3.5-flash-02-23        #   Qwen — NHANH NHẤT 1.7s
        - qwen/qwen3-vl-30b-a3b-instruct  #   Qwen — 2.2s, ngắn gọn
        - qwen/qwen3-235b-a22b-2507       #   Qwen — 2.4s
        - meta-llama/llama-4-scout       #   Meta (pool khác hẳn) — 2.6s, cite 11/12
        - z-ai/glm-4.7-flash             #   Zhipu — 3.1s, cite 12/12 TỐT NHẤT
        - tencent/hy3-preview            #   Tencent — 4.8s
                                         #   LOẠI gpt-oss-120b: content RỖNG cả 2 chế độ (unfit thật).
    selector:                       # banded_rotation: dính 1 key tới khi phục vụ 150K -> xoay key kế.
      impl: adaptive_balanced       # OpenRouter(deepseek): AIMD tự dò trần qua 429 (không TPM cố định)
      params:
        tpm_per_key: 500000         # chỉ áp cho tier OpenAI; tier OR bỏ qua (dùng AIMD)
        save_mode:                  # cạn slot deepseek -> degrade xiaomi/mimo-v2.5 (rẻ hơn gpt-4o-mini, đa dạng hoá khỏi deepseek).
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 150000
    require_tools: false            # answer node KHÔNG bind tool -> deepseek-flash ok.
    quality_floor: null
  # ── MOSA per-step (ô model độc lập, đổi model tại đây không sửa code) ──────────────────────
  plan:                             # bước LẬP KẾ HOẠCH. flash NHANH HƠN pro (~5s vs 7s) + vẫn
                                    # reason+stream. (Trước dùng 'think'=pro -> 15s+retry.) Muốn
                                    # nâng chất ca khó: đổi paid = deepseek/deepseek-v4-pro.
    tiers: [paid]
    models:
      paid:                              # //HÓA model (round-robin _pick_model_split) -> rải 4 UPSTREAM
        - qwen/qwen3.5-flash-02-23        #   -> burst 150 chia ~38/pool -> queue NÔNG hơn -> p99 ttfc↓.
        - openai/gpt-oss-120b            #   PROBE plan-format 2026-06-25 (4 câu, prose+JSON validate =
        - qwen/qwen3-235b-a22b-2507       #   Plan schema): qwen3.5-flash 4/4 ttfc 0.69s · gpt-oss-120b
        - deepseek/deepseek-v4-flash     #   4/4 ttfc 1.88s · qwen3-235b 4/4 ttfc 1.63s · deepseek-flash
                                         #   3/4 ttfc ~7s (chậm nhất, giữ vì proven prod). KHÁC vụ xiaomi
                                         #   (revert vì CHẬM): 3 model thêm NHANH HƠN deepseek -> kéo đuôi
                                         #   XUỐNG. plan KHÔNG dùng tool + ép CoT qua prompt (prose trước
                                         #   JSON) -> không cần native reasoning (qwen3-235b/gpt-oss không
                                         #   có reasoning_content vẫn hiện "Lập kế hoạch" qua prose stream).
                                         #   LOẠI: hy3-preview (format 1/4), gemma (chậm 4.1s).
                                         #   ⚠️ qwen3-235b & qwen3.5 có thể CHUNG upstream Qwen (đa dạng GPU
                                         #   ít hơn 4-family) + 235B to -> throughput thấp lúc tải nặng.
                                         #   Mới đo IDLE -> PHẢI test 150-burst + sẵn REVERT (idle≠burst).
    selector:
      impl: adaptive_balanced       # OpenRouter: AIMD tự dò trần qua 429 (không TPM cố định)
      params:
        tpm_per_key: 500000         # chỉ áp cho tier OpenAI; tier OR bỏ qua (dùng AIMD)
        save_mode:
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 150000
    require_tools: false
    quality_floor: null
  synth:                            # THINK 2 = tổng hợp + verify (verdict NEED_MORE). flash mặc định.
    tiers: [paid]
    models:
      paid: deepseek/deepseek-v4-flash   # //HÓA gpt-oss REVERT 2026-06-26 (như answer): synth cũng dùng
                                         # verdict-format -> gpt-oss phá. Giữ deepseek (proven).
    selector:
      impl: adaptive_balanced       # OpenRouter(deepseek): AIMD tự dò trần qua 429 (không TPM cố định)
      params:
        tpm_per_key: 500000         # chỉ áp cho tier OpenAI; tier OR bỏ qua (dùng AIMD)
        save_mode:
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 150000
    require_tools: false
    quality_floor: null
  triage:                           # phân loại nhanh, rẻ
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  triage_fast:                      # A FAST-PATH classifier (RAG/OTHER) — //hóa Qwen NHANH, reasoning-OFF.
                                    # Đo router-accuracy 2026-06-26 (49 câu labeled): deepseek-reason-ON
                                    # 93% @3.0s vs qwen3.5-flash-reason-OFF 93% @1.2s -> reasoning VÔ DỤNG
                                    # cho classify (accuracy GIỐNG HỆT) nhưng tốn ~2s. Tắt nghĩ + Qwen nhanh
                                    # = cắt ~1.8s/MỌI query, giữ accuracy. OFF OpenAI (qwen=OpenRouter, ổn
                                    # định prod). profiles.yaml triage node: adapter openrouter_effort +
                                    # reasoning_effort="off" (dynamic-reasoning). Spread 2 Qwen (resilience).
    tiers: [paid]
    models:
      paid:
        - qwen/qwen3.5-flash-02-23        # 1.2s — nhanh nhất
        - qwen/qwen3-vl-30b-a3b-instruct  # 1.5s — dự phòng
    require_tools: false
  think:                            # role leave_action (tạo DRAFT đơn nghỉ) — flow ĐƠN GIẢN, không cần pro.
                                    # Đổi pro->flash 2026-06-25 (probe: flash tools=OK gọi resolve_date +
                                    # reasoning=CÓ, 8.2s vs pro 14.5s, rẻ hơn). req/s ~0 nên impact nhỏ.
    tiers: [paid]                   # paid = OpenRouter (deepseek-v4-flash). Xoay KEY, KHÔNG xoay model.
    models:
      paid: deepseek/deepseek-v4-flash
    selector:
      impl: adaptive_balanced       # OpenRouter deepseek-pro: AIMD tự dò trần qua 429
      params:
        tpm_per_key: 500000         # OR bỏ qua (AIMD)
        save_mode:                  # cạn slot deepseek -> xiaomi/mimo-v2.5 (rẻ + reasoning, tránh 503).
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 150000
  worker:                           # subagents song song (Orchestrator-Workers) — fetch+phân tích
                                    # PIN gpt-5.4-mini (OpenAI). Xoay 5 key ~2.5M token/key/ngày;
                                    # cạn CẢ 5 key -> degrade gpt-4o-mini (tránh 503). KHÔNG OpenRouter.
    tiers: [free_oai]
    models:
      free_oai: openai/gpt-5.4-mini
    selector:
      impl: adaptive_balanced       # OpenAI gpt-5.4-mini: TPM-headroom (trần token/phút RÕ)
      params:
        tpm_per_key: 500000         # 5 key OpenAI, mỗi key 500K token/phút -> rải đều theo TPM
        save_mode:
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 2500000
  rerank:                           # LLM-as-reranker (chat.completions) — GIỮ cho tương thích cũ.
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  rerank_api:                       # Cohere /rerank endpoint (rerank-v3.5) qua OpenRouter — KHÁC
                                    # rerank LLM ở trên. mcp gọi /v1/rerank; router proxy GIỮ NGUYÊN
                                    # model + request/response Cohere, chỉ chuẩn hoá đi qua gateway.
    tiers: [paid]                   # OpenRouter paid (key trả deepseek dùng chung credit). KHÔNG free.
    endpoint: rerank                # endpoint provider riêng (Cohere /rerank), KHÔNG chat/embeddings
    models:
      paid: cohere/rerank-v3.5      # đổi 2026-06-25 từ rerank-4-pro (=rerank-v4.0-pro) -> v3.5
  guardrail:
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  summary:                          # tóm tắt hội thoại (memory) — rẻ, không cần reasoning/tool
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  caption:                          # ảnh -> mô tả (VISION)
    tiers: [free_oai, free_or]
    models:
      free_oai: openai/gpt-4o-mini
      free_or: google/gemma-4-31b-it:free
    require_vision: true
  ocr:                              # ảnh/scan + chart/bảng-vector -> text (VISION)
    tiers: [paid]                   # //HÓA 2026-06-26: OFF OpenAI -> 4 model vision OpenRouter (rải tải,
                                    # ổn định prod). Benchmark 15 ảnh HR thật (264 số ground-truth, reasoning
                                    # -OFF): gpt-5.4-mini 100%@4.3s vs gemini-2.5-flash-lite 100%@5.2s ·
                                    # qwen3.5-flash 100%@9.7s · qwen3.5-9b 100%@9.7s · llama-4-scout 95%@8.1s.
                                    # LOẠI: deepseek-v4-flash (no-vision CRASH), gemma-4 (chậm 28s).
    models:
      paid:                          # round-robin -> rải 3 pool (Qwen×2/Meta). Bỏ trần inflight.
                                     # google/gemini-2.5-flash-lite ĐÃ BỎ (yêu cầu 2026-06-27).
        - qwen/qwen3.5-flash-02-23        #   100% @9.7s (reasoning-OFF)
        - qwen/qwen3.5-9b                 #   100% @9.7s (reasoning-OFF)
        - meta-llama/llama-4-scout       #   95% @8.1s — pool Meta đa dạng
    selector:                       # adaptive_balanced = _pick_model_split ROUND-ROBIN 3 model (//hóa).
                                    # banded_rotation chỉ xoay KEY 1 model -> KHÔNG rải model. ⚠️ reasoning
                                    # -OFF cho qwen-vl do AI-ROUTER tự inject server-side (_prep_body:
                                    # capability=='ocr' + provider=OpenRouter); degrade OpenAI -> bỏ -> no 400.
      impl: adaptive_balanced
      params:
        tpm_per_key: 500000
        weights:                    # WEIGHTED round-robin (giữ 3 model anti-queue, chỉ đổi TỈ LỆ)
          meta-llama/llama-4-scout: 5      # 50% — chủ lực, OCR ~1.8s (10x nhanh hơn qwen)
          qwen/qwen3.5-9b: 3               # 30%
          qwen/qwen3.5-flash-02-23: 2      # 20%
        save_mode:                  # cạn band -> xiaomi/mimo-v2.5 (OpenRouter omnimodal vision)
          enabled: true
          model: xiaomi/mimo-v2.5
          tier: paid
          band_tokens: 2500000
    require_vision: true
  # ── EMBED selector (CHIA TẢI ĐA KEY) ─────────────────────────────────────────────────────────
  # banded_rotation (global) DỒN 1 key tới 250K token mới xoay — nhưng embed token TÍ XÍU (xa 250K)
  # -> kẹt cứng key-1, 4 key bỏ phí -> dưới burst (shard 5 embed/query) đập 1 key -> 429/tail 54s.
  # adaptive_balanced RẢI ĐỀU mọi key: OpenAI theo TPM-headroom, OpenRouter theo AIMD (inflight).
  # KHÔNG save_mode: embed CẤM degrade model (đổi model = vỡ vector space collection).
  embed:                            # ⚠️ PIN model cố định (BẪY embedding, PLAN §4b)
    tiers: [embed_or]              # qwen3-embedding-8b qua OpenRouter (rag-worker + query intent)
    pinned_model: qwen/qwen3-embedding-8b   # 2026-06-27: 4b->8b (3 provider, hết engine_overloaded;
                                            # MRL dim=2560 giữ nguyên vector size; collection mới tự tạo)
    selector: { impl: adaptive_balanced, params: { tpm_per_key: 500000 } }
  # ── MULTI-COLLECTION secondary embed (mỗi model PIN riêng -> đúng provider/endpoint). rag-worker
  #    ingest GHI + shard-read SEARCH (router.embeddings route theo body['model'] -> capability này). ──
  embed_e5large:
    tiers: [embed_or]
    pinned_model: intfloat/multilingual-e5-large
    selector: { impl: adaptive_balanced, params: { tpm_per_key: 500000 } }
  embed_bgem3:
    tiers: [embed_or]
    pinned_model: baai/bge-m3
    selector: { impl: adaptive_balanced, params: { tpm_per_key: 500000 } }
  embed_pplx:
    tiers: [embed_or]
    pinned_model: perplexity/pplx-embed-v1-0.6b
    selector: { impl: adaptive_balanced, params: { tpm_per_key: 500000 } }
  embed_te3s:                       # OpenAI embeddings (embed_oai tier) -> rải 5 key OpenAI theo TPM
    tiers: [embed_oai]
    pinned_model: openai/text-embedding-3-small
    selector: { impl: adaptive_balanced, params: { tpm_per_key: 500000 } }

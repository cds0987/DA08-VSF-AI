# AI Router — routing table (file hot-reload; counter ở Redis). PLAN §13.
# Thêm capability / đổi thuật toán / tinh chỉnh ngưỡng = sửa file này, KHÔNG sửa code.
version: 1

selector:
  impl: sticky_rotation_soft        # ❖ (b) sticky + soft overflow (PLAN §5.9)
  params:
    # khi key active còn dưới ngưỡng này (theo RPM) thì giữ dính; chạm thì tràn key kế
    rpm_soft_ratio: 1.0             # 1.0 = chỉ tràn khi đã full RPM (soft overflow đúng nghĩa)

tiers:
  - { name: free_oai,  endpoint_default: chat }
  - { name: free_or,   endpoint_default: chat }
  - { name: paid,      endpoint_default: chat }
  - { name: embed_oai, endpoint_default: embeddings }

# alias service truyền qua field `model` -> capability
aliases:
  auto: answer
  gpt-5.4-mini: answer
  default: answer

# Bậc thang: OpenAI free -> OpenRouter free -> paid (PLAN §5.1). Model free_or có thể
# đổi/biến mất (OpenRouter xoay free) -> selector tự bỏ qua tier nếu model không còn trong catalog.
capabilities:
  answer:                           # câu trả lời cuối + agent (cần tool)
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
    require_tools: false            # bật true nếu muốn ÉP mọi answer phải tool-capable
    quality_floor: null             # user sẽ điền model tối thiểu sau
  triage:                           # phân loại nhanh, rẻ
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  think:                            # node CHÍNH XÁC CAO: openai free -> HẾT thì vào PAID
    tiers: [free_oai, paid]         # bỏ qua free OpenRouter (yếu) — think cần độ chính xác
    models:
      free_oai: openai/gpt-5.4-mini
      paid:                           # ưu tiên CHẤT LƯỢNG (pro trước), flash/rẻ làm fallback. interchange + đối chiếu giá OpenRouter
        - deepseek/deepseek-v4-pro    # 1.6T MoE, reasoning mạnh nhất  ($0.435/$0.87, ctx 1.05M)
        - xiaomi/mimo-v2.5-pro        # pro agentic                    ($0.435/$0.87, ctx 1.05M)
        - deepseek/deepseek-v4-flash  # rẻ hơn, vẫn mạnh               ($0.098/$0.196, ctx 1.05M)
        - xiaomi/mimo-v2.5            # fallback rẻ                     ($0.14/$0.28, ctx 1.05M)
  rerank:                           # LLM-as-reranker
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  guardrail:
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  caption:                          # ảnh -> mô tả (VISION)
    tiers: [free_oai, free_or]
    models:
      free_oai: openai/gpt-4o-mini
      free_or: google/gemma-4-31b-it:free
    require_vision: true
  ocr:                              # ảnh/scan -> text (VISION)
    tiers: [free_oai, free_or]
    models:
      free_oai: openai/gpt-4o-mini
      free_or: google/gemma-4-31b-it:free
    require_vision: true
  embed:                            # ⚠️ PIN model cố định (BẪY embedding, PLAN §4b)
    tiers: [embed_oai]              # tách khỏi túi chat 2.5M; chỉ track cost
    pinned_model: openai/text-embedding-3-small

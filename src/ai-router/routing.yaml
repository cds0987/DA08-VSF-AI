# AI Router — routing table (file hot-reload; counter ở Redis). PLAN §13.
# Thêm capability / đổi thuật toán / tinh chỉnh ngưỡng = sửa file này, KHÔNG sửa code.
version: 1

selector:
  impl: banded_rotation             # ❖ DEFAULT toàn hệ: xoay key mỗi 250K token (PLAN §11.2)
  params:
    band_tokens: 250000             # key active phục vụ >= 250K (est) -> xoay key kế
    save_mode:                      # cạn MỌI tier -> ép gpt-4o-mini (OpenAI), bỏ trần free
      enabled: true
      model: openai/gpt-4o-mini
      tier: free_oai
      band_tokens: 250000

tiers:
  - { name: free_oai,  endpoint_default: chat }
  - { name: free_or,   endpoint_default: chat }
  - { name: paid,      endpoint_default: chat }
  - { name: embed_oai, endpoint_default: embeddings }
  - { name: embed_or,  endpoint_default: embeddings }   # embeddings qua OpenRouter (qwen)

# alias service truyền qua field `model` -> capability
aliases:
  auto: answer
  gpt-5.4-nano: answer
  default: answer
  # rag-worker gửi model THẬT (= embed_model fingerprint collection) -> map về capability embed.
  qwen/qwen3-embedding-4b: embed

# Bậc thang: OpenAI free -> OpenRouter free -> paid (PLAN §5.1). Model free_or có thể
# đổi/biến mất (OpenRouter xoay free) -> selector tự bỏ qua tier nếu model không còn trong catalog.
capabilities:
  answer:                           # câu trả lời cuối (split answer node) -> GIAO TOÀN BỘ
                                    # cho deepseek qua OpenRouter, xoay API key mỗi 150K token.
    tiers: [paid]                   # paid = OpenRouter (deepseek). KHÔNG dùng OpenAI free.
    models:
      paid: deepseek/deepseek-v4-flash
    selector:                       # banded_rotation: dính 1 key tới khi phục vụ 150K -> xoay key kế.
      impl: banded_rotation
      params:
        band_tokens: 150000
        save_mode:                  # cạn HẾT key deepseek -> degrade gpt-4o-mini (tránh 503).
          enabled: true
          model: openai/gpt-4o-mini
          tier: free_oai
          band_tokens: 150000
    require_tools: false            # answer node KHÔNG bind tool -> deepseek-flash ok.
    quality_floor: null
  triage:                           # phân loại nhanh, rẻ
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  think:                            # triage + planner + execute. PIN 1 MODEL = deepseek-v4-pro
                                    # (probe: tools=OK + reasoning=CÓ) -> reasoning THẬT hiện ra
                                    # ("Lập kế hoạch") + gọi tool được + ỔN ĐỊNH (bỏ blend gpt↔deepseek).
    tiers: [paid]                   # paid = OpenRouter (deepseek-v4-pro). Xoay KEY, KHÔNG xoay model.
    models:
      paid: deepseek/deepseek-v4-pro
    selector:
      impl: banded_rotation
      params:
        band_tokens: 150000         # dính 1 key tới 150K token -> xoay key kế (cùng model).
        save_mode:                  # cạn hết key deepseek -> gpt-4o-mini (tránh 503).
          enabled: true
          model: openai/gpt-4o-mini
          tier: free_oai
          band_tokens: 150000
  rerank:                           # LLM-as-reranker
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  guardrail:
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  summary:                          # tóm tắt hội thoại (memory) — rẻ, không cần reasoning/tool
    tiers: [free_oai, free_or, paid]
    models:
      free_oai: openai/gpt-4o-mini
      free_or:                        # interchange: model đầu sập -> tự thử model kế
        - google/gemma-4-31b-it:free
        - qwen/qwen3-next-80b-a3b-instruct:free
        - openai/gpt-oss-120b:free
      paid: deepseek/deepseek-v4-flash
  caption:                          # ảnh -> mô tả (VISION)
    tiers: [free_oai, free_or]
    models:
      free_oai: openai/gpt-4o-mini
      free_or: google/gemma-4-31b-it:free
    require_vision: true
  ocr:                              # ảnh/scan -> text (VISION)
    tiers: [free_oai, free_or]
    models:
      free_oai: openai/gpt-4o-mini
      free_or: google/gemma-4-31b-it:free
    require_vision: true
  embed:                            # ⚠️ PIN model cố định (BẪY embedding, PLAN §4b)
    tiers: [embed_or]              # qwen3-embedding-4b qua OpenRouter (rag-worker + query intent)
    pinned_model: qwen/qwen3-embedding-4b

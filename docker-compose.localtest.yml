# ─────────────────────────────────────────────────────────────────────────
# LOCAL TEST: luồng THẬT document-service -> NATS -> rag-worker -> Qdrant -> mcp.
# Storage = GCS (S3-interop HMAC) THẬT.  VectorDB = Qdrant Cloud THẬT.
# Postgres + NATS = local container. OpenAI embeddings = THẬT.
#
#   docker compose -f docker-compose.localtest.yml up -d --build
#
# Secrets đọc từ .env (gitignored): OPENAI_API_KEY, QDRANT_URL, QDRANT_API_KEY,
# GCS_HMAC_KEY, GCS_HMAC_SECRET, JWT_SECRET_KEY. Xem docs/e2e-cloud-ingest-search-test.md.
# ─────────────────────────────────────────────────────────────────────────

x-gcs: &gcs-s3
  S3_ENDPOINT_URL: https://storage.googleapis.com
  S3_ACCESS_KEY_ID: ${GCS_HMAC_KEY:?set GCS_HMAC_KEY in .env}
  S3_SECRET_ACCESS_KEY: ${GCS_HMAC_SECRET:?set GCS_HMAC_SECRET in .env}
  S3_REGION: auto

x-qdrant: &qdrant-cloud
  VECTOR_DB_PROVIDER: qdrant
  VECTOR_DB_URL: ${QDRANT_URL:?set QDRANT_URL in .env}
  VECTOR_DB_API_KEY: ${QDRANT_API_KEY:-}
  # Qdrant sau nginx Basic Auth (http) -> user:pass; rỗng nếu dùng Qdrant Cloud api-key.
  VECTOR_DB_BASIC_AUTH: ${VECTOR_DB_BASIC_AUTH:-}
  VECTOR_COLLECTION: rag_chatbot

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: postgres
    volumes:
      - ./infra/localtest/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 15

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    ports:
      - "127.0.0.1:4222:4222"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 15

  # rag-worker migration one-shot (alembic upgrade head trên rag_db)
  rag-migrate:
    build:
      context: ./src/rag-worker
    image: rag-worker:local
    command: ["alembic", "upgrade", "head"]
    working_dir: /app
    environment:
      # 1 biến Cloud SQL URL duy nhất. DEFAULT = production (Cloud SQL) -> rag-worker dev
      # + DevOps phát triển song song trên CÙNG 1 DB. Luồng CI override RAG_DATABASE_URL
      # = postgres local (isolated, không đụng Cloud SQL prod).
      DATABASE_URL: ${RAG_DATABASE_URL:-postgresql+psycopg://postgres:***REDACTED-DB-PW***@34.87.63.152:5432/rag_db}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  rag-worker:
    image: rag-worker:local
    environment:
      <<: [*gcs-s3, *qdrant-cloud]
      APP_ENV: production
      LOG_LEVEL: INFO
      AI_PROVIDER: openai
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}
      EMBED_MODEL: text-embedding-3-small
      EMBED_DIMENSION: "1536"
      CAPTION_MODEL: gpt-4o-mini
      # DEFAULT = production Cloud SQL (1 URL chung dev/deploy); CI override -> postgres local.
      DATABASE_URL: ${RAG_DATABASE_URL:-postgresql+psycopg://postgres:***REDACTED-DB-PW***@34.87.63.152:5432/rag_db}
      NATS_URL: nats://nats:4222
      NATS_JETSTREAM_ENABLED: "true"
      NATS_STREAM: DOCS
      NATS_STREAM_AUTO_CREATE: "1"
      PARSER_IMPL: s3
      S3_SOURCE_BUCKET: vsf-rag-chatbot-docs-dev
      SOURCE_ROOT: /tmp
      ARTIFACT_ROOT: /tmp/artifacts
      INGEST_WORKER_COUNT: "1"
    ports:
      - "127.0.0.1:8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      rag-migrate:
        condition: service_completed_successfully

  document-service:
    build:
      context: ./src/document-service
    environment:
      <<: *gcs-s3
      # DEFAULT = production Cloud SQL doc_db (asyncpg); CI override -> postgres local.
      DATABASE_URL: ${DOC_DATABASE_URL:-postgresql+asyncpg://postgres:***REDACTED-DB-PW***@34.87.63.152:5432/doc_db}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?set JWT_SECRET_KEY in .env}
      JWT_ALGORITHM: HS256
      NATS_URL: nats://nats:4222
      NATS_JETSTREAM_ENABLED: "true"
      STORAGE_BACKEND: s3
      S3_BUCKET: vsf-rag-chatbot-docs-dev
    ports:
      - "127.0.0.1:8002:8002"
    depends_on:
      postgres:
        condition: service_healthy
      nats:
        condition: service_healthy
      rag-worker:
        condition: service_started

  mcp-service:
    build:
      context: ./src/mcp-service
    image: mcp-service:local
    environment:
      <<: *qdrant-cloud
      AI_PROVIDER: openai
      EMBED_MODEL: text-embedding-3-small
      EMBED_DIMENSION: "1536"
      OPENAI_API_KEY: ${OPENAI_API_KEY:?set OPENAI_API_KEY in .env}
      RERANK_PROVIDER: none
    ports:
      - "127.0.0.1:8003:8003"
    depends_on:
      - rag-worker

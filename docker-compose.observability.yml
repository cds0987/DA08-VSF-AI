# ============================================================================
# MONITOR STACK — tách riêng khỏi app (devops sở hữu, lifecycle độc lập).
# Chạy OVERLAY cùng project để DÙNG CHUNG network mặc định với app
# (Prometheus scrape ai-router:8010, cadvisor đọc docker socket host):
#   docker compose -f docker-compose.yml -f docker-compose.observability.yml up -d <svc>
# App KHÔNG phụ thuộc — observability mất chỉ mất biểu đồ/alert, KHÔNG ảnh hưởng app.
# Không mở port host (firewall 80/443/22); Grafana expose qua nginx subdomain.
# ============================================================================
services:
  # Prometheus — scrape ai-router/metrics + node-exporter + otel-collector; nạp alert rules.
  prometheus:
    image: prom/prometheus:v2.54.1
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
      - --web.enable-lifecycle           # reload rules qua POST /-/reload
    volumes:
      - ./deploy/observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./deploy/observability/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    restart: unless-stopped

  # node-exporter — metric host (CPU/RAM/đĩa/network VM).
  node-exporter:
    image: prom/node-exporter:v1.8.2
    command:
      - --path.rootfs=/host
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)
    pid: host
    volumes:
      - /:/host:ro,rslave
    restart: unless-stopped

  # (cAdvisor đã GỠ: VM cgroup-v2 này cAdvisor v0.49 chỉ đọc cgroup root, không ra per-container
  # — giới hạn cadvisor+kernel. Per-service resource lấy từ Phase 2 OTel; VM-level: node-exporter.)

  # Alertmanager — gom alert từ Prometheus -> Slack (webhook đọc từ file secret, fail-open).
  alertmanager:
    image: prom/alertmanager:v0.27.0
    command:
      - --config.file=/etc/alertmanager/alertmanager.yml
    volumes:
      - ./deploy/observability/alertmanager/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
      - ./deploy/observability/alertmanager/secrets:/etc/alertmanager/secrets:ro
      - alertmanager_data:/alertmanager
    restart: unless-stopped

  # Grafana — 1 cửa dashboard. Expose qua nginx grafana.vsfchat.cloud (Basic Auth + Cloudflare).
  grafana:
    image: grafana/grafana:11.2.0
    environment:
      GF_SERVER_ROOT_URL: https://grafana.vsfchat.cloud
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_AUTH_BASIC_ENABLED: "false"
      GF_SECURITY_ADMIN_PASSWORD: "${GRAFANA_ADMIN_PASSWORD:-vsf-grafana-admin}"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
      GF_USERS_VIEWERS_CAN_EDIT: "true"   # cho Viewer (anonymous) DÙNG Explore (query Tempo/Loki/Prom), KHÔNG lưu được
    volumes:
      - ./deploy/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./deploy/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      prometheus:
        condition: service_started
    restart: unless-stopped

  # ───── Trace/Log backend + OTel Collector (Phase 2: nhận OTLP từ service đã instrument) ─────
  # OTel Collector — gom OTLP từ service, chia traces->Tempo, logs->Loki, metrics->Prometheus.
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.109.0
    command: ["--config=/etc/otelcol/config.yaml"]
    volumes:
      - ./deploy/observability/otel-collector/config.yaml:/etc/otelcol/config.yaml:ro
    mem_limit: 512m
    depends_on:
      tempo:
        condition: service_started
      loki:
        condition: service_started
    restart: unless-stopped

  # Tempo — lưu trace (OTLP). Storage disk, retention 7d, RAM ≤1g.
  tempo:
    image: grafana/tempo:2.6.1
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./deploy/observability/tempo/tempo.yaml:/etc/tempo/tempo.yaml:ro
      - tempo_data:/var/tempo
    mem_limit: 1g
    restart: unless-stopped

  # Loki — lưu log (OTLP). Storage disk, retention 14d, RAM ≤1g.
  loki:
    image: grafana/loki:3.1.1
    command: ["-config.file=/etc/loki/loki.yaml"]
    volumes:
      - ./deploy/observability/loki/loki.yaml:/etc/loki/loki.yaml:ro
      - loki_data:/loki
    mem_limit: 1g
    restart: unless-stopped

volumes:
  prometheus_data:
  grafana_data:
  alertmanager_data:
  tempo_data:
  loki_data:

services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    ports:
      - "127.0.0.1:6333:6333"
    volumes:
      - eval_qdrant_data:/qdrant/storage
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: evalminio
      MINIO_ROOT_PASSWORD: evalminio123
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - eval_minio_data:/data
    restart: unless-stopped

  minio-init:
    image: minio/mc:latest
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 evalminio evalminio123; do
          sleep 2
        done
        mc mb -p local/vsf-rag-chatbot-docs-dev || true
        mc anonymous set none local/vsf-rag-chatbot-docs-dev || true
    restart: "no"

  document-service:
    depends_on:
      minio-init:
        condition: service_completed_successfully
    environment:
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: evalminio
      S3_SECRET_ACCESS_KEY: evalminio123
      S3_REGION: us-east-1
      S3_BUCKET: vsf-rag-chatbot-docs-dev

  rag-worker:
    depends_on:
      qdrant:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    environment:
      VECTOR_DB_PROVIDER: qdrant
      VECTOR_DB_URL: http://qdrant:6333
      VECTOR_DB_API_KEY: ""
      VECTOR_DB_BASIC_AUTH: ""
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY_ID: evalminio
      S3_SECRET_ACCESS_KEY: evalminio123
      S3_REGION: us-east-1
      S3_SOURCE_BUCKET: vsf-rag-chatbot-docs-dev

  mcp-service:
    depends_on:
      qdrant:
        condition: service_started
    environment:
      VECTOR_DB_PROVIDER: qdrant
      VECTOR_DB_URL: http://qdrant:6333
      VECTOR_DB_API_KEY: ""
      VECTOR_DB_BASIC_AUTH: ""

  query-service:
    environment:
      QDRANT_URL: http://qdrant:6333
      QDRANT_API_KEY: ""
      QDRANT_COLLECTION: rag_chatbot

volumes:
  eval_minio_data:
  eval_qdrant_data:
